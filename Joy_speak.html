<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>기쁨이의 말하기 연습 🗣️</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF9F0; --card:#FFFFFF; --border:#FFE0B2; --text:#3D2B1F; --muted:#A08070;
  --gold:#FFB300; --green:#4CAF50; --red:#FF6B6B; --radius:28px; --font:'Gaegu', sans-serif;
}
* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); }
body { font-family:var(--font); color:var(--text); touch-action:manipulation; }
.screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; overflow-y:auto; }
.screen.active { display:flex; }
.big-btn { font-family:var(--font); font-weight:700; border:none; border-radius:999px; cursor:pointer;
  transition:transform .12s; box-shadow:0 6px 0 rgba(0,0,0,.12); }
.big-btn:active { transform:translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.12); }

#title-screen .mascot { font-size:6rem; animation:bob 2.4s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
#title-screen h1 { font-size:clamp(2rem,7vw,2.8rem); margin:8px 0 4px; }
#title-screen p { color:var(--muted); font-size:1.15rem; margin-bottom:28px; text-align:center; max-width:340px; }
.start-btn { background:var(--gold); color:#fff; font-size:1.5rem; padding:20px 50px; }
.no-mic-note { margin-top:18px; font-size:.95rem; color:var(--muted); text-align:center; max-width:320px; }

#unit-screen { padding:20px 16px; justify-content:flex-start; }
.top-row { width:100%; max-width:600px; display:flex; align-items:center; gap:12px; margin-bottom:18px; }
.mascot-mini { font-size:2.4rem; }
.top-title { font-size:1.4rem; flex:1; }
.unit-grid { width:100%; max-width:600px; display:grid; grid-template-columns:1fr 1fr; gap:14px; }
@media (max-width:480px){ .unit-grid{ grid-template-columns:1fr; } }
.unit-card { background:var(--card); border-radius:var(--radius); border:4px solid var(--ucolor,var(--border));
  padding:20px 16px; text-align:center; box-shadow:0 6px 0 rgba(0,0,0,.06); min-height:120px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; cursor:pointer; }
.unit-card:active { transform:translateY(3px); }
.unit-icon { font-size:2.2rem; }
.unit-name { font-size:1.1rem; }

#practice-screen { padding:16px; }
.practice-top { width:100%; max-width:560px; display:flex; align-items:center; gap:10px; margin-bottom:16px; }
.back-mini { width:48px; height:48px; border-radius:50%; background:var(--card); border:3px solid var(--border);
  font-size:1.3rem; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.progress-wrap { flex:1; height:16px; background:var(--card); border:3px solid var(--border); border-radius:99px; overflow:hidden; }
.progress-bar { height:100%; background:linear-gradient(90deg,#FFD166,#FFB300); border-radius:99px; transition:width .3s; }

.practice-card { background:var(--card); border-radius:var(--radius); border:4px solid var(--border);
  padding:30px 22px; width:100%; max-width:560px; text-align:center; box-shadow:0 8px 0 rgba(0,0,0,.06); }
.mascot-say { font-size:3rem; margin-bottom:6px; }
.target-en { font-size:clamp(1.4rem,6vw,1.9rem); line-height:1.4; margin-bottom:6px; }
.target-kr { font-size:1.1rem; color:var(--muted); margin-bottom:22px; }
.action-row { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin-bottom:16px; }
.round-btn { width:96px; height:96px; border-radius:50%; font-size:2.2rem; display:flex; align-items:center; justify-content:center; }
.round-btn.listen { background:#DCEFFF; border:4px solid #4488FF; }
.round-btn.mic { background:#FFE3E3; border:4px solid var(--red); }
.round-btn.mic.recording { background:var(--red); animation:pulse 1s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
.hint { color:var(--muted); font-size:1rem; min-height:26px; }
.heard-box { margin-top:10px; font-size:1.1rem; color:#4488FF; min-height:28px; }
.skip-link { margin-top:14px; font-size:.95rem; color:var(--muted); text-decoration:underline; cursor:pointer; background:none; border:none; font-family:var(--font); }

.feedback-banner { position:fixed; top:24px; left:50%; transform:translateX(-50%);
  font-size:1.5rem; font-weight:700; padding:10px 26px; border-radius:99px; z-index:50;
  animation:bannerpop 1.1s ease forwards; pointer-events:none; }
@keyframes bannerpop { 0%{opacity:0;transform:translate(-50%,-14px) scale(.8)} 15%{opacity:1;transform:translate(-50%,0) scale(1.05)}
  25%{transform:translate(-50%,0) scale(1)} 82%{opacity:1} 100%{opacity:0;transform:translate(-50%,-6px) scale(1)} }
.fb-ok { background:#E4F8E1; color:#2E7D32; }
.fb-no { background:#FFF0DC; color:#B26A00; }

#done-screen .mascot { font-size:5.2rem; }
.done-card { background:var(--card); border-radius:var(--radius); border:4px solid var(--gold); padding:32px 26px;
  text-align:center; max-width:400px; width:100%; box-shadow:0 8px 0 rgba(0,0,0,.08); }
.done-title { font-size:1.7rem; margin:8px 0 12px; }
.done-btn { background:var(--gold); color:#fff; font-size:1.2rem; padding:16px 40px; }

.confetti { position:fixed; pointer-events:none; z-index:60; width:10px; height:14px; border-radius:3px;
  animation:conf-fall var(--dur,1.6s) ease-in var(--del,0s) forwards; }
@keyframes conf-fall { 0%{transform:translateY(-10px) rotate(0);opacity:1} 100%{transform:translateY(105vh) rotate(480deg);opacity:0} }
::-webkit-scrollbar{width:0;height:0}
</style>
<style id="joy-back-btn-style">
  #joy-back { position:fixed; top:14px; left:14px; z-index:9999; background:#FF6B6B; color:#fff; border:none;
    border-radius:99px; padding:10px 20px; font-family:'Gaegu',cursive; font-size:1.1rem; font-weight:700;
    cursor:pointer; box-shadow:0 4px 16px rgba(255,107,107,.4); display:flex; align-items:center; gap:6px;
    transition:transform .18s; text-decoration:none; }
  #joy-back:hover { transform:scale(1.07); }
  #joy-back:active { transform:scale(.95); }
</style>
</head>
<body>
<a id="joy-back" href="https://drumismylife.github.io/Joy/" title="메인으로 돌아가기">🏠 메인</a>

<!-- ═══ 타이틀 ═══ -->
<div class="screen active" id="title-screen">
  <div class="mascot">🦜</div>
  <h1>기쁨이의 말하기 연습</h1>
  <p>앵무새 친구와 함께 영어 문장을 듣고 따라 말해봐요!</p>
  <button class="big-btn start-btn" onclick="goUnits()">시작하기 ✨</button>
  <div class="no-mic-note" id="noMicNote" style="display:none">
    ⚠️ 이 브라우저는 음성 인식을 지원하지 않아요. 듣고 따라 말하는 연습은 되지만, 자동으로 맞았는지 확인은 못 해줘요. (Safari 사용을 추천해요)
  </div>
</div>

<!-- ═══ 단원 선택 ═══ -->
<div class="screen" id="unit-screen">
  <div class="top-row"><div class="mascot-mini">🦜</div><div class="top-title">어떤 문장을 연습할까요?</div></div>
  <div class="unit-grid" id="unit-grid"></div>
</div>

<!-- ═══ 연습 ═══ -->
<div class="screen" id="practice-screen">
  <div class="practice-top">
    <div class="back-mini" onclick="goUnits()">←</div>
    <div class="progress-wrap"><div class="progress-bar" id="practice-progress" style="width:0%"></div></div>
  </div>
  <div class="practice-card">
    <div class="mascot-say">🦜</div>
    <div class="target-en" id="target-en">Sentence</div>
    <div class="target-kr" id="target-kr">번역</div>
    <div class="action-row">
      <button class="round-btn listen" id="listenBtn" title="들어보기">🔊</button>
      <button class="round-btn mic" id="micBtn" title="말해보기">🎤</button>
    </div>
    <div class="hint" id="hint">먼저 🔊을 눌러 듣고, 🎤을 눌러 따라 말해보세요!</div>
    <div class="heard-box" id="heardBox"></div>
    <button class="skip-link" id="skipBtn">다음 문장 →</button>
  </div>
</div>

<!-- ═══ 완료 ═══ -->
<div class="screen" id="done-screen">
  <div class="mascot">🎉</div>
  <div class="done-card">
    <div class="done-title" id="done-title">연습 완료!</div>
    <button class="big-btn done-btn" onclick="goUnits()">단원 목록으로</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  Wonders Grade 2 문장 데이터 (Joy_word4.html의 Wonders 세트 재사용)
// ════════════════════════════════════════════════════════
const UNITS = [
  { id:'w1', icon:'👨‍👩‍👧', name:'가족·우정', color:'#EF476F', sentences:[
    ['MY FRIEND INVITED ME TO HER HOUSE','내 친구가 나를 자기 집에 초대했어요.'],
    ['WE SHARE OUR TOYS WITH EACH OTHER','우리는 서로 장난감을 나눠요.'],
    ['THE FIREFIGHTER CAME TO RESCUE THE CAT','소방관이 고양이를 구하러 왔어요.'],
  ]},
  { id:'w2', icon:'🐻', name:'동물·우화', color:'#FFD166', sentences:[
    ['A DOG IS A KIND OF MAMMAL','개는 포유류의 한 종류예요.'],
    ['THE BIRD TOOK CARE OF ITS OFFSPRING','새는 자기 새끼를 돌봤어요.'],
    ['WE HAD A BIG FEAST ON MY BIRTHDAY','내 생일에 큰 잔치를 벌였어요.'],
  ]},
  { id:'w3', icon:'🏘️', name:'지역사회·하늘', color:'#06D6A0', sentences:[
    ['MY GRANDMOTHER LIVES IN THE COUNTRYSIDE','우리 할머니는 시골에 사세요.'],
    ['SHE FOUND A SOLUTION TO THE PROBLEM','그녀는 문제의 해결책을 찾았어요.'],
    ['WE WENT ON A FUN ADVENTURE TOGETHER','우리는 함께 신나는 모험을 떠났어요.'],
  ]},
  { id:'w4', icon:'🌍', name:'세계·지구 변화', color:'#118AB2', sentences:[
    ['WE WATCHED THE PARADE DOWN THE STREET','우리는 거리를 지나가는 퍼레이드를 봤어요.'],
    ['THE ISLAND IS SURROUNDED BY BLUE WATER','그 섬은 파란 물로 둘러싸여 있어요.'],
    ['MY LITTLE BROTHER IS VERY ACTIVE','내 남동생은 아주 활동적이에요.'],
  ]},
  { id:'w5', icon:'🦸', name:'영웅·시민의식', color:'#8338EC', sentences:[
    ['SHE WORKED HARD TO BECOME A CHAMPION','그녀는 챔피언이 되려고 열심히 노력했어요.'],
    ['SCIENTISTS DISCOVER NEW THINGS EVERY DAY','과학자들은 매일 새로운 것을 발견해요.'],
    ['IT IS MY RESPONSIBILITY TO FEED THE DOG','개에게 밥을 주는 건 내 책임이에요.'],
  ]},
  { id:'w6', icon:'💰', name:'돈·신화·상상력', color:'#FB5607', sentences:[
    ['I WANT TO PURCHASE A NEW BOOK','나는 새 책을 사고 싶어요.'],
    ['GOLD HAS A GOLDEN COLOR','금은 금빛 색깔을 가지고 있어요.'],
    ['USE YOUR IMAGINATION TO DRAW A DRAGON','상상력을 발휘해서 용을 그려보세요.'],
  ]},
];

// ════════════════════════════════════════════════════════
//  음성 (무료, 브라우저 내장 Web Speech API — API 키 불필요)
// ════════════════════════════════════════════════════════
const SpeechRecognitionCls = window.SpeechRecognition || window.webkitSpeechRecognition;
const synth = window.speechSynthesis;
let recognizer = null;
if (SpeechRecognitionCls) {
  recognizer = new SpeechRecognitionCls();
  recognizer.lang = 'en-US';
  recognizer.continuous = false;
  recognizer.interimResults = false;
} else {
  document.getElementById('noMicNote').style.display = 'block';
}

function speak(text) {
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US'; u.rate = 0.85;
  synth.speak(u);
}

// ════════════════════════════════════════════════════════
//  화면 전환
// ════════════════════════════════════════════════════════
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goUnits(){ renderUnits(); showScreen('unit-screen'); }

function renderUnits(){
  const grid = document.getElementById('unit-grid');
  grid.innerHTML = '';
  UNITS.forEach(u=>{
    const card = document.createElement('div');
    card.className = 'unit-card'; card.style.setProperty('--ucolor', u.color);
    card.onclick = () => startUnit(u.id);
    card.innerHTML = `<div class="unit-icon">${u.icon}</div><div class="unit-name">${u.name}</div>`;
    grid.appendChild(card);
  });
}

// ════════════════════════════════════════════════════════
//  연습 세션
// ════════════════════════════════════════════════════════
let P = { unit:null, idx:0 };

function startUnit(unitId){
  P = { unit: UNITS.find(u=>u.id===unitId), idx:0 };
  showScreen('practice-screen');
  nextSentence();
}

function nextSentence(){
  const list = P.unit.sentences;
  if (P.idx >= list.length){ finishUnit(); return; }
  document.getElementById('practice-progress').style.width = (P.idx/list.length*100)+'%';
  const [en, kr] = list[P.idx];
  document.getElementById('target-en').textContent = en;
  document.getElementById('target-kr').textContent = kr;
  document.getElementById('hint').textContent = '먼저 🔊을 눌러 듣고, 🎤을 눌러 따라 말해보세요!';
  document.getElementById('heardBox').textContent = '';
  document.getElementById('micBtn').classList.remove('recording');
}

function finishUnit(){
  document.getElementById('done-title').textContent = `${P.unit.name} 연습 완료! 🎉`;
  spawnConfetti();
  showScreen('done-screen');
}

document.getElementById('listenBtn').onclick = () => speak(document.getElementById('target-en').textContent);

document.getElementById('micBtn').onclick = () => {
  if (!recognizer) {
    document.getElementById('hint').textContent = '이 브라우저는 음성 인식을 지원하지 않아요. 듣기만 연습해봐요!';
    return;
  }
  document.getElementById('micBtn').classList.add('recording');
  document.getElementById('hint').textContent = '듣고 있어요... 말해보세요! 🎧';
  try { recognizer.start(); } catch(e) { /* already started guard */ }
};

if (recognizer) {
  recognizer.onresult = (event) => {
    const heard = event.results[0][0].transcript;
    document.getElementById('heardBox').textContent = `내가 말한 것: "${heard}"`;
    checkAnswer(heard);
  };
  recognizer.onerror = () => {
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('hint').textContent = '잘 안 들렸어요. 다시 눌러서 말해볼까요? 🎤';
  };
  recognizer.onend = () => {
    document.getElementById('micBtn').classList.remove('recording');
  };
}

function normalizeWords(s){
  return s.toUpperCase().replace(/[^A-Z\s]/g,'').split(/\s+/).filter(Boolean);
}

function checkAnswer(heard){
  const target = normalizeWords(document.getElementById('target-en').textContent);
  const said = normalizeWords(heard);
  const saidSet = new Set(said);
  const matchCount = target.filter(w=>saidSet.has(w)).length;
  const ratio = matchCount / target.length;

  if (ratio >= 0.6) {
    banner('참 잘했어요! 🎉', 'fb-ok');
    spawnConfetti();
    P.idx++;
    setTimeout(()=>nextSentence(), 1300);
  } else {
    banner('다시 한번 말해볼까요? 💪', 'fb-no');
    document.getElementById('hint').textContent = '🔊을 눌러 다시 듣고 따라 해봐요!';
  }
}

document.getElementById('skipBtn').onclick = () => { P.idx++; nextSentence(); };

function banner(text, cls){
  const el = document.createElement('div');
  el.className = 'feedback-banner ' + cls; el.textContent = text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 1100);
}
function spawnConfetti(){
  const cols=['#FF6B6B','#FFD166','#4CAF50','#4488FF','#FF9F1C','#CC66FF'];
  for(let i=0;i<16;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.cssText=`left:${Math.random()*100}%;background:${cols[i%cols.length]};--dur:${Math.random()*.8+1}s;--del:${Math.random()*.2}s`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),1800);
  }
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
renderUnits();
</script>
</body>
</html>
