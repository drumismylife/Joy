<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA(앱 모드) 설정 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="퍼플렉시티">
    <title>퍼플렉시티 음성 공간</title>
    <style>
        :root {
            --color-primary: #2180c8;
            --color-primary-hover: #1d7ab0;
            --color-success: #22c55e;
            --color-warning: #f59e0b;
            --color-error: #ef4444;
            --color-bg: #f9fafb;
            --color-surface: #ffffff;
            --color-text: #1f2937;
            --color-text-secondary: #6b7280;
            --color-border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            padding: 16px;
            /* 아이폰 노치 대응 (기본) */
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        /* 아이폰 홈 화면 앱으로 실행될 때 스타일 */
        @media all and (display-mode: standalone) {
            body {
                background-color: #f0f9ff; /* 배경색 살짝 변경 */
                padding-top: 50px; /* 상단 여백 추가 */
            }
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: var(--color-surface);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: var(--color-text);
        }

        .header p {
            color: var(--color-text-secondary);
            font-size: 14px;
        }

        .api-setup {
            margin-bottom: 24px;
        }

        .setup-card {
            background: linear-gradient(135deg, #f0f9ff 0%, #eff6ff 100%);
            border: 2px solid var(--color-primary);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .setup-card h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: var(--color-text);
        }

        .setup-desc {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-bottom: 16px;
        }

        .api-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 12px;
            font-family: monospace;
            color: var(--color-text);
            background-color: white;
        }

        .setup-hint {
            font-size: 12px;
            color: var(--color-text-secondary);
            margin-top: 12px;
            font-style: italic;
        }

        .status-box {
            background-color: #f0f9ff;
            border: 2px solid var(--color-primary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            text-align: center;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        .status-indicator.active {
            background-color: var(--color-success);
        }

        .status-indicator.inactive {
            background-color: var(--color-text-secondary);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-weight: 600;
            font-size: 16px;
        }

        .space-selector {
            margin-bottom: 24px;
        }

        .space-label {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: var(--color-text);
        }

        .space-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .space-btn {
            padding: 12px;
            border: 2px solid var(--color-border);
            background-color: var(--color-surface);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--color-text);
        }

        .space-btn:active {
            transform: scale(0.98);
        }

        .space-btn.active {
            background-color: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .main-controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .btn {
            padding: 16px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--color-primary);
            color: white;
        }

        .btn-secondary {
            background-color: #f3f4f6;
            color: var(--color-text);
            border: 1px solid var(--color-border);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .icon {
            font-size: 20px;
        }

        .info-box {
            background-color: #fffbeb;
            border-left: 4px solid var(--color-warning);
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #92400e;
            line-height: 1.5;
        }

        .response-box {
            background-color: #f0f9ff;
            border: 1px solid #bfdbfe;
            border-radius: 10px;
            padding: 16px;
            margin-top: 16px;
            min-height: 60px;
            display: none;
        }

        .response-box.active {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .response-label {
            font-weight: 600;
            font-size: 12px;
            color: #0369a1;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .response-text {
            font-size: 15px;
            color: var(--color-text);
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap; /* 줄바꿈 유지 */
        }

        .response-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .response-btn {
            flex: 1;
            padding: 10px;
            font-size: 12px;
            border: 1px solid #bfdbfe;
            background-color: white;
            border-radius: 6px;
            cursor: pointer;
            color: var(--color-primary);
            font-weight: 500;
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--color-border);
            font-size: 12px;
            color: var(--color-text-secondary);
        }

        .main-app {
            display: none;
        }

        .main-app.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎙️ 퍼플렉시티</h1>
            <p>나만의 음성 어시스턴트</p>
        </div>

        <div class="api-setup" id="apiSetup">
            <div class="setup-card">
                <h3>🔑 API 키 설정</h3>
                <p class="setup-desc">Perplexity API 키를 입력해주세요</p>
                <input type="password" id="apiKeyInput" placeholder="pplx-로 시작하는 API 키 입력" class="api-input">
                <button class="btn btn-primary" id="saveKeyBtn">
                    <span class="icon">💾</span>
                    <span>API 키 저장</span>
                </button>
                <p class="setup-hint">ℹ️ 홈 화면에 추가한 앱에서 로그인해야 키가 유지됩니다.</p>
            </div>
        </div>

        <div class="main-app" id="mainApp">
            <div class="status-box">
                <span class="status-indicator inactive" id="statusIndicator"></span>
                <span class="status-text" id="statusText">준비 완료</span>
            </div>

            <div class="space-selector">
                <div class="space-label">📍 공간 선택</div>
                <div class="space-buttons">
                    <button class="space-btn active" data-space="default">기본 공간</button>
                    <button class="space-btn" data-space="english">영어 교육</button>
                    <button class="space-btn" data-space="invest">투자 분석</button>
                    <button class="space-btn" data-space="music">음악</button>
                </div>
            </div>

            <div class="info-box">
                💡 "퍼플렉시티야"라고 부르거나 시작 버튼을 누르세요.
            </div>

            <div class="main-controls">
                <button class="btn btn-primary" id="startBtn">
                    <span class="icon">🎤</span>
                    <span>시작 (퍼플렉시티야)</span>
                </button>
                <button class="btn btn-secondary" id="stopBtn" disabled>
                    <span class="icon">⏹️</span>
                    <span>중지</span>
                </button>
            </div>

            <div class="response-box" id="responseBox">
                <div class="response-label">응답</div>
                <div class="response-text" id="responseText"></div>
                <div class="response-buttons">
                    <button class="response-btn" id="repeatBtn">🔊 다시 듣기</button>
                    <button class="response-btn" id="clearBtn">✕ 닫기</button>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>iPhone 홈 화면에 추가하여 사용하세요</p>
        </div>
    </div>

    <script>
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;
        
        let recognition;
        let isListening = false;
        let lastResponse = '';
        let currentSpace = 'default';
        let apiKey = '';

        // ✨ 수정된 사용자 맞춤 지침 설정 ✨
        const spaceGuidelines = {
            default: {
                name: '기본 공간',
                instruction: `당신은 스마트 어시스턴트입니다. 사용자는 연구 분석가이면서 아버지, 드러머, 투자 관심층입니다.

[Task]
1. 핵심 응답(2-3문장, 250자 이내)을 먼저 제시합니다.
2. 이어서 다음 질문 3개를 제안합니다:
   • 질문1
   • 질문2
   • 질문3

[Tone]
친근하되 전문적인 존댓말 사용. 마크다운 기호(*,#) 최소화.`,
                temperature: 0.7
            },
            english: {
                name: '영어 교육',
                instruction: `당신은 6-7세 아이(기쁨이)의 영어 교사입니다. 재미있고 격려하는 말투로 답변하세요.

[Task]
1. 단순하고 쉬운 단어로 설명 (초등 1학년 수준)
2. 발음을 한글로 표기: [발음]
3. 칭찬과 격려 포함

[Constraints]
- 문장 길이 < 20단어
- 반복과 운율 활용
- 항상 긍정적 피드백`,
                temperature: 0.8
            },
            invest: {
                name: '투자 분석',
                instruction: `당신은 기술적 분석 전문가입니다. 데이터 기반의 객관적 투자 분석을 제공합니다.

[Task]
1. 기술적 관점에서 현재 상황 분석
2. 근거: [데이터/지표]
3. 주의: [위험 요소]

[Constraints]
- "투자 조언이 아님" 명시
- 감정적 표현 최소화
- 구체적 수치 필수`,
                temperature: 0.3
            },
            music: {
                name: '음악',
                instruction: `당신은 경험 많은 드러머이자 음악 멘토입니다. 리듬, 그루브, 악기 기술을 실용적으로 설명합니다.

[Task]
1. 핵심 팁 제시
2. 연습법: [단계별 방법]
3. 참고: [영감 제공 뮤지션/곡]

[Tone]
긍정적이고 실험적. 음악 용어는 설명과 함께 제시.`,
                temperature: 0.7
            }
        };

        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const apiSetup = document.getElementById('apiSetup');
        const mainApp = document.getElementById('mainApp');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusText = document.getElementById('statusText');
        const statusIndicator = document.getElementById('statusIndicator');
        const responseBox = document.getElementById('responseBox');
        const responseText = document.getElementById('responseText');
        const repeatBtn = document.getElementById('repeatBtn');
        const clearBtn = document.getElementById('clearBtn');
        const spaceBtns = document.querySelectorAll('.space-btn');

        function initApp() {
            // 저장된 키 확인
            const savedKey = localStorage.getItem('perplexity_api_key');
            if (savedKey) {
                apiKey = savedKey;
                showMainApp();
            }
        }

        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (!key.startsWith('pplx-')) {
                alert('API 키는 "pplx-"로 시작해야 합니다');
                return;
            }
            localStorage.setItem('perplexity_api_key', key);
            apiKey = key;
            apiKeyInput.value = '';
            showMainApp();
        });

        function showMainApp() {
            apiSetup.style.display = 'none';
            mainApp.classList.add('active');
            initSpeechRecognition();
        }

        function initSpeechRecognition() {
            if (!SpeechRecognition) {
                statusText.textContent = '⚠️ 이 브라우저는 음성 인식을 지원하지 않습니다 (Safari 권장)';
                return;
            }

            recognition = new SpeechRecognition();
            recognition.lang = 'ko-KR';
            recognition.continuous = false;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isListening = true;
                startBtn.disabled = true;
                stopBtn.disabled = false;
                statusIndicator.classList.remove('inactive');
                statusIndicator.classList.add('active');
                statusText.textContent = '🎤 듣는 중...';
                responseBox.classList.remove('active');
            };

            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }

                if (transcript.includes('퍼플렉시티야')) {
                    recognition.stop();
                    setTimeout(() => {
                        recognition.start();
                    }, 500);
                    return;
                }

                if (event.results[event.results.length - 1].isFinal) {
                    handleQuestion(transcript);
                }
            };

            recognition.onerror = (event) => {
                statusText.textContent = '❌ 다시 시도해주세요';
                stopBtn.disabled = true;
                startBtn.disabled = false;
                isListening = false;
            };

            recognition.onend = () => {
                if (isListening) {
                    statusIndicator.classList.add('inactive');
                    statusIndicator.classList.remove('active');
                    statusText.textContent = '준비 완료';
                    startBtn.disabled = false;
                    stopBtn.disabled = true;
                    isListening = false;
                }
            };
        }

        spaceBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                spaceBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSpace = btn.dataset.space;
                // 공간 변경 시 안내
                statusText.textContent = `📍 ${spaceGuidelines[currentSpace].name} 선택됨`;
            });
        });

        startBtn.addEventListener('click', () => {
            if (recognition && !isListening) {
                recognition.start();
            }
        });

        stopBtn.addEventListener('click', () => {
            if (recognition) {
                recognition.stop();
            }
        });

        async function handleQuestion(question) {
            if (!question.trim()) return;

            statusText.textContent = '⏳ 생각하는 중...';
            
            try {
                const response = await callPerplexityAPI(question, currentSpace);
                
                lastResponse = response;
                responseText.textContent = response;
                responseBox.classList.add('active');
                
                // 답변 읽어주기
                speakResponse(response);
            } catch (error) {
                responseText.textContent = '오류가 발생했습니다: ' + error.message;
                responseBox.classList.add('active');
            }

            statusText.textContent = '준비 완료';
            statusIndicator.classList.add('inactive');
            statusIndicator.classList.remove('active');
            startBtn.disabled = false;
            stopBtn.disabled = true;
            isListening = false;
        }

        // ✨ 수정된 API 호출 함수 (sonar 모델, 개선된 구조) ✨
        async function callPerplexityAPI(question, space) {
            const guidelines = spaceGuidelines[space];
            const systemContext = `[${guidelines.name}]\n${guidelines.instruction}`;
            
            try {
                const response = await fetch('https://api.perplexity.ai/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'sonar',
                        messages: [
                            {
                                role: 'user',
                                content: `${systemContext}\n\n사용자 질문: ${question}`
                            }
                        ],
                        max_tokens: 500,
                        temperature: guidelines.temperature
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`API 오류 (${response.status}): ${errorData.error?.message || 'Unknown error'}`);
                }

                const data = await response.json();
                let content = data.choices?.[0]?.message?.content;
                
                if (!content) {
                    throw new Error('응답 내용이 비어있습니다.');
                }
                
                // 음성 출력용 정제 (마크다운 기호 제거)
                content = content.replace(/[*#\-]/g, '').trim();
                
                return content;
            } catch (error) {
                throw new Error(`API 호출 실패: ${error.message}`);
            }
        }

        function speakResponse(text) {
            synth.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 0.9;  // 자연스러운 속도
            utterance.pitch = 1.0;

            synth.speak(utterance);
        }

        repeatBtn.addEventListener('click', () => {
            if (lastResponse) {
                speakResponse(lastResponse);
            }
        });

        clearBtn.addEventListener('click', () => {
            responseBox.classList.remove('active');
            lastResponse = '';
            synth.cancel();
        });

        initApp();
    </script>
</body>
</html>
