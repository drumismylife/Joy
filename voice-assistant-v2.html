<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="영어 말하기 친구">
<title>🎙️ 영어 말하기 친구</title>
<style>
/* ── 변수 ─────────────────────────────────── */
:root {
  --accent: #6366f1;
  --accent2: #8b5cf6;
  --bg: #f0f4ff;
  --card: #ffffff;
  --user-bubble: #dcf8c6;
  --text: #1e1e2e;
  --muted: #6b7280;
  --radius: 18px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
body.dad-mode {
  --accent: #0ea5e9;
  --accent2: #06b6d4;
  --bg: #f0f9ff;
}

/* ── 리셋 ─────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── Joy 메인 복귀 버튼 ────────────────────── */
#joy-back {
  position: fixed;
  top: calc(10px + var(--safe-top));
  left: 12px;
  z-index: 999;
  background: rgba(255,255,255,.92);
  border: 1.5px solid #e5e7eb;
  border-radius: 50px;
  padding: 6px 14px;
  font-size: .8rem;
  font-weight: 700;
  color: #374151;
  text-decoration: none;
  backdrop-filter: blur(8px);
  box-shadow: 0 2px 8px rgba(0,0,0,.1);
}

/* ── 화면 전환 ─────────────────────────────── */
.screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.screen.active { display: flex; }

/* ═══════════════════════════════════════════
   화면 1: API 설정
═══════════════════════════════════════════ */
#screen-setup {
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: linear-gradient(160deg, var(--bg), #e0e7ff);
}
.setup-card {
  background: var(--card);
  border-radius: 24px;
  padding: 32px 24px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 16px 48px rgba(99,102,241,.15);
  text-align: center;
}
.setup-icon { font-size: 3.5rem; margin-bottom: 12px; }
.setup-card h2 { font-size: 1.4rem; color: var(--accent); margin-bottom: 6px; }
.setup-card p { font-size: .9rem; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
.setup-input {
  width: 100%;
  padding: 13px 16px;
  border: 2px solid #e5e7eb;
  border-radius: 12px;
  font-size: 1rem;
  outline: none;
  transition: border-color .2s;
  margin-bottom: 12px;
  font-family: monospace;
  letter-spacing: 1px;
  background: #f9fafb;
}
.setup-input:focus { border-color: var(--accent); background: #fff; }
.setup-btn {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 1.05rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .2s, transform .15s;
}
.setup-btn:active { transform: scale(.97); }
.setup-hint {
  margin-top: 14px;
  font-size: .8rem;
  color: #9ca3af;
  line-height: 1.7;
}
.setup-hint a { color: var(--accent); text-decoration: none; }

/* ═══════════════════════════════════════════
   화면 2: 메인 채팅
═══════════════════════════════════════════ */
#screen-main { background: var(--bg); }

/* ── 상단바 ──────────────────────────────── */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: calc(var(--safe-top) + 52px) 16px 10px;
  background: var(--card);
  border-bottom: 1px solid #e5e7eb;
  flex-shrink: 0;
  gap: 10px;
}
.profile-toggle {
  display: flex;
  background: #f3f4f6;
  border-radius: 50px;
  padding: 3px;
  gap: 3px;
}
.profile-btn {
  border: none;
  border-radius: 50px;
  padding: 7px 16px;
  font-size: .88rem;
  font-weight: 700;
  cursor: pointer;
  background: transparent;
  color: var(--muted);
  transition: all .25s;
}
.profile-btn.active {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  box-shadow: 0 2px 8px rgba(99,102,241,.35);
}
.status-area {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: .82rem;
  color: var(--muted);
  font-weight: 600;
  flex-shrink: 0;
}
.status-dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: #9ca3af;
  transition: background .3s;
  flex-shrink: 0;
}
.status-dot.ready     { background: #22c55e; }
.status-dot.listening { background: #ef4444; animation: blink 1s infinite; }
.status-dot.thinking  { background: #f59e0b; animation: blink 1s infinite; }
.status-dot.speaking  { background: var(--accent); animation: blink 1.5s infinite; }
@keyframes blink {
  0%,100%{ opacity:1; } 50%{ opacity:.35; }
}

/* ── 채팅 영역 ───────────────────────────── */
#chatArea {
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
#chatArea::-webkit-scrollbar { width: 3px; }
#chatArea::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

/* ── 말풍선 공통 ─────────────────────────── */
.bubble-row {
  display: flex;
  gap: 8px;
  max-width: 90%;
  animation: slideIn .22s ease-out;
}
.bubble-row.user { align-self: flex-end; flex-direction: row-reverse; max-width: 78%; }
.bubble-row.ai   { align-self: flex-start; }
@keyframes slideIn {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.bubble-avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
  align-self: flex-end;
}
.bubble {
  border-radius: var(--radius);
  padding: 11px 14px;
  font-size: .96rem;
  line-height: 1.55;
  box-shadow: 0 2px 8px rgba(0,0,0,.07);
  word-break: break-word;
  max-width: 100%;
}
/* 사용자 말풍선 */
.bubble.user-msg {
  background: var(--user-bubble);
  border-bottom-right-radius: 5px;
  color: #1a3a1a;
}
/* AI 말풍선 */
.bubble.ai-msg { border-bottom-left-radius: 5px; }
.bubble.t-translation { background: #eff6ff; }
.bubble.t-conversation{ background: #f0fdf4; }
.bubble.t-correction  { background: #fff7ed; }
.bubble.t-teaching    { background: #fff; border: 1.5px solid #e5e7eb; }
.bubble.t-error       { background: #fef2f2; color: #7f1d1d; }
.bubble.t-loading     { background: #f3f4f6; }
.bubble.t-system      { background: linear-gradient(135deg,#f0f4ff,#e0e7ff); font-style: italic; color: #4b5563; white-space: pre-line; }

/* ── 말풍선 내부 요소 ────────────────────── */
.bubble-type-badge {
  font-size: .71rem;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 5px;
  letter-spacing: .4px;
}
.bubble-english {
  font-size: 1.22rem;
  font-weight: 800;
  color: var(--accent);
  margin: 3px 0 5px;
  line-height: 1.35;
}
.bubble-pronunciation {
  display: inline-block;
  background: #e0e7ff;
  color: var(--accent);
  border-radius: 50px;
  padding: 2px 11px;
  font-size: .82rem;
  font-weight: 700;
  margin: 3px 0 5px;
}
.bubble-korean {
  font-size: .9rem;
  color: #374151;
  margin-top: 4px;
  line-height: 1.5;
}
/* 교정 카드 */
.correction-card {
  margin-top: 10px;
  background: rgba(255,255,255,.75);
  border: 1.5px solid #fed7aa;
  border-radius: 12px;
  padding: 10px 13px;
}
.correction-original {
  font-size: .87rem;
  color: #dc2626;
  text-decoration: line-through;
  margin-bottom: 4px;
}
.correction-fixed {
  font-size: 1rem;
  font-weight: 700;
  color: #15803d;
  margin-bottom: 5px;
}
.correction-fixed::before { content: '→ '; }
.correction-tip {
  font-size: .82rem;
  color: #92400e;
  line-height: 1.4;
}
/* 칭찬 배지 */
.praise-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 9px;
  background: linear-gradient(135deg, #fef9c3, #fde68a);
  color: #854d0e;
  border-radius: 50px;
  padding: 4px 12px;
  font-size: .82rem;
  font-weight: 700;
}
/* 로딩 점 */
.loading-dots { display: flex; gap: 5px; padding: 3px 0; }
.loading-dots span {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #9ca3af;
  animation: dotBounce 1.2s ease-in-out infinite;
}
.loading-dots span:nth-child(2){ animation-delay:.2s; }
.loading-dots span:nth-child(3){ animation-delay:.4s; }
@keyframes dotBounce {
  0%,80%,100%{ transform:translateY(0); opacity:.4; }
  40%        { transform:translateY(-7px); opacity:1; }
}

/* ── 인식 중 임시 텍스트 ─────────────────── */
.interim-bar {
  min-height: 24px;
  padding: 4px 16px;
  font-size: .82rem;
  color: var(--muted);
  font-style: italic;
  text-align: center;
  flex-shrink: 0;
  background: var(--bg);
}

/* ── 하단 마이크 영역 ────────────────────── */
.mic-area {
  padding: 10px 20px calc(var(--safe-bot) + 14px);
  background: var(--card);
  border-top: 1px solid #e5e7eb;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.mic-btn {
  width: 68px; height: 68px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  box-shadow: 0 5px 18px rgba(99,102,241,.4);
  transition: all .2s;
  user-select: none;
}
.mic-btn:active { transform: scale(.93); }
.mic-btn.listening {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  box-shadow: 0 5px 18px rgba(239,68,68,.5), 0 0 0 0 rgba(239,68,68,.3);
  animation: micRing 1.4s ease-in-out infinite;
}
.mic-btn.processing {
  background: #e5e7eb;
  color: #9ca3af;
  box-shadow: none;
  cursor: default;
  animation: none;
}
@keyframes micRing {
  0%  { box-shadow: 0 5px 18px rgba(239,68,68,.5), 0 0 0 0 rgba(239,68,68,.3); }
  60% { box-shadow: 0 5px 18px rgba(239,68,68,.5), 0 0 0 16px rgba(239,68,68,0); }
  100%{ box-shadow: 0 5px 18px rgba(239,68,68,.5), 0 0 0 0 rgba(239,68,68,0); }
}
.mic-icon  { font-size: 1.7rem; line-height: 1; }
.mic-label { font-size: .62rem; font-weight: 700; letter-spacing: .5px; }
.mic-hint  { font-size: .78rem; color: var(--muted); text-align: center; }

/* ── 텍스트 입력 영역 ────────────────────── */
.text-input-row {
  display: flex;
  gap: 8px;
  width: 100%;
  max-width: 480px;
}
.text-input {
  flex: 1;
  padding: 11px 15px;
  border: 1.5px solid #e5e7eb;
  border-radius: 50px;
  font-size: .95rem;
  font-family: inherit;
  outline: none;
  background: #f9fafb;
  transition: border-color .2s;
  color: var(--text);
}
.text-input:focus { border-color: var(--accent); background: #fff; }
.text-send-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  font-size: 1.1rem;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: transform .15s, opacity .2s;
}
.text-send-btn:active { transform: scale(.9); }
.text-send-btn:disabled { opacity: .4; cursor: default; }

/* ── PWA 독립 모드 ───────────────────────── */
@media all and (display-mode: standalone) {
  body { background: var(--bg); }
}
</style>
</head>
<body class="joy-mode">

<!-- 메인으로 돌아가기 -->
<a id="joy-back" href="https://drumismylife.github.io/Joy/">🏠 메인</a>

<!-- ═══════════════════════════════════════
     화면 1: API 설정
═══════════════════════════════════════ -->
<div id="screen-setup" class="screen active">
  <div class="setup-card">
    <div class="setup-icon">🎙️</div>
    <h2>영어 말하기 친구</h2>
    <p>Google Gemini API 키를 입력하면<br>영어 대화를 시작할 수 있어요!</p>
    <input type="password" id="apiKeyInput" class="setup-input"
      placeholder="AIza 로 시작하는 API 키 입력..."
      autocomplete="off" spellcheck="false">
    <button class="setup-btn" onclick="saveApiKey()">시작하기 🚀</button>
    <p class="setup-hint">
      키는 이 기기에만 저장됩니다.<br>
      <a href="https://aistudio.google.com/app/apikey" target="_blank">
        Google AI Studio
      </a>에서 무료로 발급받을 수 있어요.
    </p>
  </div>
</div>

<!-- ═══════════════════════════════════════
     화면 2: 메인 채팅
═══════════════════════════════════════ -->
<div id="screen-main" class="screen">

  <!-- 상단바 -->
  <div class="top-bar">
    <div class="profile-toggle">
      <button class="profile-btn active" id="btnJoy" onclick="switchProfile('joy')">🌸 기쁨이</button>
      <button class="profile-btn"        id="btnDad" onclick="switchProfile('dad')">👨 아빠</button>
    </div>
    <div class="status-area">
      <div class="status-dot ready" id="statusDot"></div>
      <span id="statusText">준비됨</span>
    </div>
  </div>

  <!-- 채팅 영역 -->
  <main id="chatArea"></main>

  <!-- 인식 중 임시 텍스트 -->
  <div class="interim-bar" id="interimBar"></div>

  <!-- 하단 입력 영역 -->
  <div class="mic-area">
    <!-- 텍스트 입력 -->
    <div class="text-input-row">
      <input type="text" class="text-input" id="textInput"
        placeholder="타이핑으로 입력해도 돼요..."
        autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="text-send-btn" id="sendBtn" onclick="sendText()">➤</button>
    </div>
    <!-- 마이크 버튼 -->
    <button class="mic-btn" id="micBtn" onclick="toggleMic()">
      <span class="mic-icon" id="micIcon">🎤</span>
      <span class="mic-label" id="micLabel">말하기</span>
    </button>
    <span class="mic-hint" id="micHint">탭해서 영어로 말해보세요!</span>
  </div>

</div><!-- #screen-main -->

<script>
/* ════════════════════════════════════════════
   상수 & 프롬프트
════════════════════════════════════════════ */
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent';
const MAX_HISTORY_TURNS = 6;

const JOY_PROMPT = `You are Joy's warm and playful English teacher. Joy (기쁨이) is a 6-year-old Korean girl learning English with her dad.

CRITICAL: Respond ONLY with a single valid JSON object. No markdown fences, no text before or after.

Required JSON schema:
{"type":"...","display":{"english":"...","pronunciation":"...","korean_note":"..."},"tts_segments":[{"lang":"...","text":"...","rate":0.0}],"praise":"..."}

TYPE rules — pick exactly one:
- "translation"  → user asks "~이/가 영어로 뭐야?" or requests a word/phrase translation
- "conversation" → user says a Korean sentence/situation to convert into English
- "correction"   → user speaks English with grammar errors (also add display.correction object)
- "teaching"     → user speaks correct/near-correct English (continue in English)

DISPLAY rules:
- english: Grade 1 vocabulary, max 8 words, add a fun emoji if natural
- pronunciation: Korean phonetic spelling. Examples → cat:캣, school:스쿨, water:워터, hello:헬로우, beautiful:뷰리풀, thank you:땡큐, nice:나이스
- korean_note: short Korean explanation (max 20 chars)
- correction (only for "correction" type): add key "correction":{"original":"...","fixed":"...","tip":"..."}

TTS_SEGMENTS — split response into language segments:
- Korean explanation text  → {"lang":"ko-KR","text":"...","rate":0.85}
- English word / sentence  → {"lang":"en-US","text":"...","rate":0.68}
- Korean pronunciation     → {"lang":"ko-KR","text":"...","rate":0.76}

PRAISE: always warm and encouraging. Occasionally use "기쁨아". Example: "기쁨아 정말 잘했어요! ⭐"

Example for "고양이 영어로 뭐야?":
{"type":"translation","display":{"english":"Cat! 🐱","pronunciation":"캣","korean_note":"고양이예요!"},"tts_segments":[{"lang":"ko-KR","text":"고양이는 영어로","rate":0.85},{"lang":"en-US","text":"Cat!","rate":0.65},{"lang":"ko-KR","text":"캣! 이라고 해요","rate":0.76}],"praise":"기쁨아 정말 좋은 질문이에요! ⭐"}`;

const DAD_PROMPT = `You are a friendly English conversation partner and gentle coach for a Korean adult (아빠).

CRITICAL: Respond ONLY with a single valid JSON object. No markdown fences, no text before or after.

Required JSON schema:
{"type":"...","display":{"english":"...","pronunciation":null,"korean_note":null,"correction":null},"tts_segments":[{"lang":"...","text":"...","rate":0.0}],"praise":null}

TYPE rules — pick exactly one:
- "translation"  → user asks for English word/phrase translation in Korean
- "conversation" → user expresses a situation in Korean → convert to natural English
- "correction"   → user speaks English with grammar or naturalness issues
- "teaching"     → user speaks correct English → respond fully in English (immersion)

DISPLAY rules:
- english: natural adult-level English
- pronunciation: include only for difficult/unusual words, otherwise null
- korean_note: brief Korean context only when needed, null for "teaching" type
- correction (only for "correction" type): {"original":"...","fixed":"...","tip":"..."} — tip explains WHY, use "자연스럽게는" framing, never "틀렸어요"

TTS_SEGMENTS:
- "teaching" type: ALL segments in en-US for full immersion → {"lang":"en-US","text":"...","rate":0.88}
- Other types: mix ko-KR (rate:0.9) and en-US (rate:0.88) segments

PRAISE: set to null — adults don't need praise every time.

Example for "I goed to the store":
{"type":"correction","display":{"english":"I went to the store.","pronunciation":null,"korean_note":"go 과거형은 went","correction":{"original":"I goed to the store","fixed":"I went to the store","tip":"'go'는 불규칙 동사라 자연스럽게는 'went'를 써요."}},"tts_segments":[{"lang":"ko-KR","text":"자연스럽게는 이렇게 말해요","rate":0.9},{"lang":"en-US","text":"I went to the store.","rate":0.88}],"praise":null}`;

/* ════════════════════════════════════════════
   상태
════════════════════════════════════════════ */
const state = {
  profile: 'joy',
  apiKey: '',
  isListening: false,
  isProcessing: false,
  isSpeaking: false,
  chatHistory: [],   // [{role:'user'|'model', text:'...'}]
  voices: []
};

/* ════════════════════════════════════════════
   초기화
════════════════════════════════════════════ */
(function init() {
  const savedKey  = localStorage.getItem('gemini_api_key')  || '';
  const savedProf = localStorage.getItem('talk_profile')    || 'joy';

  if (savedKey) {
    state.apiKey = savedKey;
    applyProfile(savedProf);
    showScreen('screen-main');
    addSystemBubble(welcomeMsg(savedProf));
  }

  loadVoices();
  initRecognition();

  document.getElementById('apiKeyInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveApiKey();
  });
  document.getElementById('textInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendText();
  });
})();

function welcomeMsg(p) {
  return p === 'joy'
    ? '안녕하세요! 🌸 저는 기쁨이의 영어 선생님이에요!\n"고양이 영어로 뭐야?" 처럼 물어보거나\n영어로 말해봐요! 🎤'
    : '안녕하세요! 👨 영어 말하기 파트너예요!\n한국어로 말하면 영어 표현을 알려드리고,\n영어로 말하면 자연스러운 표현을 코칭해드려요! 🎤';
}

/* ════════════════════════════════════════════
   API 키 저장
════════════════════════════════════════════ */
function saveApiKey() {
  const val = (document.getElementById('apiKeyInput').value || '').trim();
  if (!val) { alert('API 키를 입력해주세요.'); return; }
  if (!val.startsWith('AIza')) { alert('올바른 Gemini API 키를 입력해주세요.\n(AIza 로 시작해야 해요)'); return; }
  state.apiKey = val;
  localStorage.setItem('gemini_api_key', val);
  document.getElementById('apiKeyInput').value = '';
  applyProfile('joy');
  showScreen('screen-main');
  addSystemBubble(welcomeMsg('joy'));
}

/* ════════════════════════════════════════════
   화면 전환
════════════════════════════════════════════ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ════════════════════════════════════════════
   프로필 전환
════════════════════════════════════════════ */
function applyProfile(p) {
  state.profile = p;
  localStorage.setItem('talk_profile', p);
  document.body.className = p === 'joy' ? 'joy-mode' : 'dad-mode';
  document.getElementById('btnJoy').classList.toggle('active', p === 'joy');
  document.getElementById('btnDad').classList.toggle('active', p === 'dad');
  document.getElementById('micHint').textContent =
    p === 'joy' ? '탭해서 영어로 말해보세요!' : '탭해서 말하기 (한국어 / 영어 모두 OK)';
}

function switchProfile(p) {
  if (state.profile === p) return;
  applyProfile(p);
  state.chatHistory = [];
  addSystemBubble(p === 'joy'
    ? '🌸 기쁨이 모드로 바꿨어요! 쉬운 영어를 배워봐요!'
    : '👨 아빠 모드로 바꿨어요! 자연스러운 영어 회화를 연습해봐요!');
}

/* ════════════════════════════════════════════
   Gemini API 호출
════════════════════════════════════════════ */
async function callGeminiAPI(userText) {
  const sysPrompt = state.profile === 'joy' ? JOY_PROMPT : DAD_PROMPT;
  const hist = state.chatHistory.slice(-MAX_HISTORY_TURNS);

  // contents 배열 구성
  const contents = [];

  if (hist.length === 0) {
    // 첫 발화: 시스템 프롬프트를 첫 user 메시지에 prepend
    contents.push({ role: 'user', parts: [{ text: sysPrompt + '\n\n---\nUser input: ' + userText }] });
  } else {
    // 멀티턴: 이전 대화 + 시스템 프롬프트는 첫 번째에만
    hist.forEach((h, i) => {
      const role = h.role; // 'user' | 'model'
      const text = (i === 0 && role === 'user')
        ? sysPrompt + '\n\n---\nUser input: ' + h.text
        : h.text;
      contents.push({ role, parts: [{ text }] });
    });
    contents.push({ role: 'user', parts: [{ text: userText }] });
  }

  const res = await fetch(`${GEMINI_URL}?key=${state.apiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents,
      generationConfig: {
        temperature: 0.7,
        maxOutputTokens: 700,
        responseMimeType: 'application/json'
      }
    })
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const msg = err?.error?.message || `HTTP ${res.status}`;
    throw new Error(msg);
  }
  const data = await res.json();
  return data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

/* ════════════════════════════════════════════
   JSON 파싱
════════════════════════════════════════════ */
function extractJSON(raw) {
  // 코드블록 제거 시도
  const cb = raw.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (cb) return cb[1].trim();
  // { ... } 범위 추출
  const s = raw.indexOf('{'), e = raw.lastIndexOf('}');
  if (s !== -1 && e > s) return raw.slice(s, e + 1);
  return null;
}

function parseResponse(raw) {
  const jsonStr = extractJSON(raw);
  if (!jsonStr) return makeFallback(raw);
  try {
    return normalize(JSON.parse(jsonStr));
  } catch {
    return makeFallback(raw);
  }
}

const VALID_TYPES = ['translation', 'conversation', 'correction', 'teaching'];

function normalize(p) {
  if (!VALID_TYPES.includes(p.type)) p.type = 'conversation';
  if (!p.display) p.display = {};
  if (!Array.isArray(p.tts_segments) || p.tts_segments.length === 0) {
    p.tts_segments = buildTts(p);
  }
  return p;
}

function buildTts(p) {
  const isJoy = state.profile === 'joy';
  const segs = [];
  if (p.display.korean_note) segs.push({ lang:'ko-KR', text: p.display.korean_note, rate: 0.85 });
  if (p.display.english)     segs.push({ lang:'en-US', text: p.display.english,     rate: isJoy ? 0.68 : 0.88 });
  if (p.display.pronunciation) segs.push({ lang:'ko-KR', text: p.display.pronunciation, rate: 0.76 });
  return segs;
}

function makeFallback(raw) {
  const clean = raw.replace(/[*#`]/g, '').trim().slice(0, 200);
  return {
    type: 'conversation',
    display: { english: '', pronunciation: null, korean_note: clean },
    tts_segments: [{ lang: 'ko-KR', text: clean, rate: 0.9 }],
    praise: null
  };
}

/* ════════════════════════════════════════════
   채팅 UI
════════════════════════════════════════════ */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function avatarHTML() {
  const cls = state.profile === 'joy' ? 'joy-av' : 'dad-av';
  const bg  = state.profile === 'joy' ? '#fce7f3' : '#dbeafe';
  const em  = state.profile === 'joy' ? '🌸' : '🎓';
  return `<div class="bubble-avatar" style="background:${bg}">${em}</div>`;
}

function addRow(html, isUser) {
  const row = document.createElement('div');
  row.className = 'bubble-row ' + (isUser ? 'user' : 'ai');
  row.innerHTML = html;
  document.getElementById('chatArea').appendChild(row);
  scrollBot();
  return row;
}

function addSystemBubble(text) {
  addRow(`${avatarHTML()}<div class="bubble ai-msg t-system">${esc(text)}</div>`, false);
}

function addUserBubble(text) {
  addRow(`<div class="bubble user-msg">${esc(text)}</div>`, true);
}

function addLoadingBubble() {
  return addRow(
    `${avatarHTML()}<div class="bubble ai-msg t-loading"><div class="loading-dots"><span></span><span></span><span></span></div></div>`,
    false
  );
}

function addAIBubble(parsed) {
  const { type, display, praise } = parsed;
  const badges = { translation:'📖 번역', conversation:'💬 표현', correction:'✏️ 교정', teaching:'🌍 대화' };
  const badge = badges[type] || '💬';

  let inner = `<div class="bubble-type-badge">${badge}</div>`;
  if (display.english)       inner += `<div class="bubble-english">${esc(display.english)}</div>`;
  if (display.pronunciation) inner += `<div class="bubble-pronunciation">[ ${esc(display.pronunciation)} ]</div>`;
  if (display.korean_note)   inner += `<div class="bubble-korean">${esc(display.korean_note)}</div>`;
  if (display.correction) {
    const c = display.correction;
    inner += `<div class="correction-card">
      <div class="correction-original">${esc(c.original)}</div>
      <div class="correction-fixed">${esc(c.fixed)}</div>
      ${c.tip ? `<div class="correction-tip">💡 ${esc(c.tip)}</div>` : ''}
    </div>`;
  }
  if (praise) inner += `<div class="praise-badge">🌟 ${esc(praise)}</div>`;

  addRow(`${avatarHTML()}<div class="bubble ai-msg t-${type}">${inner}</div>`, false);
}

function addErrorBubble(msg) {
  addRow(
    `<div class="bubble-avatar" style="background:#fee2e2">⚠️</div>
     <div class="bubble ai-msg t-error">😥 오류: ${esc(msg)}<br><small style="opacity:.7">API 키와 인터넷 연결을 확인해주세요.</small></div>`,
    false
  );
}

function scrollBot() {
  const ca = document.getElementById('chatArea');
  ca.scrollTop = ca.scrollHeight;
}

/* ════════════════════════════════════════════
   상태 표시
════════════════════════════════════════════ */
function setStatus(s, label) {
  document.getElementById('statusDot').className = 'status-dot ' + s;
  document.getElementById('statusText').textContent = label;
}

function setMic(s) {
  // s: 'ready' | 'listening' | 'processing'
  state.isListening  = s === 'listening';
  state.isProcessing = s === 'processing';
  const btn   = document.getElementById('micBtn');
  const icon  = document.getElementById('micIcon');
  const label = document.getElementById('micLabel');
  btn.className = 'mic-btn' + (s !== 'ready' ? ' ' + s : '');
  if (s === 'listening')  { icon.textContent = '🎙️'; label.textContent = '듣는중'; setStatus('listening', '듣는중...'); }
  else if (s === 'processing') { icon.textContent = '⏳'; label.textContent = '생각중'; setStatus('thinking', '생각중...'); }
  else                    { icon.textContent = '🎤'; label.textContent = '말하기'; setStatus('ready', '준비됨'); }
  // 텍스트 전송 버튼도 연동
  const sendBtn = document.getElementById('sendBtn');
  if (sendBtn) sendBtn.disabled = (s !== 'ready');
}

/* ════════════════════════════════════════════
   음성 인식 (Web Speech API)
════════════════════════════════════════════ */
let recognition = null;

function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;

  recognition = new SR();
  recognition.lang = 'ko-KR';       // 한글/영어 혼용 모두 인식됨
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onresult = e => {
    let interim = '', final = '';
    for (const r of e.results) {
      if (r.isFinal) final += r[0].transcript;
      else interim += r[0].transcript;
    }
    document.getElementById('interimBar').textContent = interim || final;
    if (final) handleInput(final.trim());
  };

  recognition.onend = () => {
    // 처리 중이 아닐 때만 ready 상태로
    if (!state.isProcessing) setMic('ready');
  };

  recognition.onerror = e => {
    if (e.error !== 'no-speech' && e.error !== 'aborted') {
      addErrorBubble('음성 인식 오류: ' + e.error);
    }
    if (!state.isProcessing) setMic('ready');
  };
}

function toggleMic() {
  if (state.isProcessing || state.isSpeaking) return;
  if (state.isListening) {
    recognition && recognition.stop();
    setMic('ready');
  } else {
    startListen();
  }
}

function startListen() {
  if (!recognition) {
    addErrorBubble('이 브라우저는 음성 인식을 지원하지 않아요.\nSafari 를 사용해주세요.');
    return;
  }
  // 진행 중 TTS 중단
  window.speechSynthesis.cancel();
  state.isSpeaking = false;
  document.getElementById('interimBar').textContent = '';
  try { recognition.start(); } catch(e) { /* already started */ }
  setMic('listening');
}

/* ════════════════════════════════════════════
   핵심 흐름: 입력 처리
════════════════════════════════════════════ */
async function handleInput(text) {
  if (!text) return;
  document.getElementById('interimBar').textContent = '';
  setMic('processing');

  addUserBubble(text);
  const loadingRow = addLoadingBubble();

  try {
    const raw    = await callGeminiAPI(text);
    const parsed = parseResponse(raw);

    // 로딩 버블 제거 후 AI 버블 추가
    loadingRow.remove();
    addAIBubble(parsed);

    // 히스토리 저장 (최근 MAX_HISTORY_TURNS 턴 유지)
    state.chatHistory.push({ role: 'user',  text });
    const modelText = parsed.display.english || parsed.display.korean_note || '';
    if (modelText) state.chatHistory.push({ role: 'model', text: modelText });

    // TTS 순차 발화
    if (parsed.tts_segments?.length) {
      await speakAll(parsed.tts_segments);
    }
  } catch(e) {
    loadingRow.remove();
    addErrorBubble(e.message);
  } finally {
    setMic('ready');
  }
}

/* ════════════════════════════════════════════
   TTS 순차 발화
════════════════════════════════════════════ */
function loadVoices() {
  const refresh = () => { state.voices = window.speechSynthesis.getVoices(); };
  refresh();
  window.speechSynthesis.onvoiceschanged = refresh;
}

function getVoice(lang) {
  return state.voices.find(v => v.lang === lang)
      || state.voices.find(v => v.lang.startsWith(lang.split('-')[0]))
      || null;
}

function speakOne(seg) {
  return new Promise(resolve => {
    const u = new SpeechSynthesisUtterance(seg.text);
    u.lang  = seg.lang;
    u.rate  = (seg.rate || 0.9) * (state.profile === 'joy' && seg.lang === 'en-US' ? 0.9 : 1.0);
    u.pitch = seg.lang === 'en-US' ? 1.05 : 1.0;
    const v = getVoice(seg.lang);
    if (v) u.voice = v;
    u.onend   = resolve;
    u.onerror = resolve;
    window.speechSynthesis.speak(u);
  });
}

async function speakAll(segments) {
  state.isSpeaking = true;
  setStatus('speaking', '말하는중...');
  window.speechSynthesis.cancel();
  for (const seg of segments) {
    if (!state.isSpeaking) break;
    await speakOne(seg);
  }
  state.isSpeaking = false;
  if (!state.isListening && !state.isProcessing) setStatus('ready', '준비됨');
}

/* ════════════════════════════════════════════
   텍스트 입력 전송
════════════════════════════════════════════ */
function sendText() {
  if (state.isProcessing || state.isSpeaking) return;
  const input = document.getElementById('textInput');
  const text = (input.value || '').trim();
  if (!text) return;
  input.value = '';
  handleInput(text);
}
