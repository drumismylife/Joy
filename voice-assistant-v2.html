<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>영어 말하기 친구</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

    /* ── Setup Screen ── */
    #setup-screen{position:fixed;inset:0;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);display:flex;align-items:center;justify-content:center;z-index:100}
    .card{background:#fff;border-radius:24px;padding:40px 32px;width:min(400px,90vw);box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .card-logo{font-size:3rem;text-align:center;margin-bottom:8px}
    .card-title{font-size:1.4rem;font-weight:700;text-align:center;color:#1a1a2e;margin-bottom:4px}
    .card-sub{font-size:.85rem;color:#666;text-align:center;margin-bottom:28px}
    .field-label{font-size:.8rem;font-weight:600;color:#555;margin-bottom:6px;display:block}
    .field-input{width:100%;padding:12px 16px;border:2px solid #e5e7eb;border-radius:12px;font-size:.9rem;font-family:monospace;color:#333;transition:border-color .2s}
    .field-input:focus{outline:none;border-color:#667eea}
    .field-note{font-size:.76rem;color:#999;margin-top:8px;margin-bottom:24px;line-height:1.5}
    .field-note a{color:#667eea}
    .btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer}
    .btn-primary:active{opacity:.85}
    .setup-err{color:#ef4444;font-size:.8rem;margin-top:10px;text-align:center;display:none}

    /* ── Main Screen ── */
    #main-screen{display:flex;flex-direction:column;height:100dvh}

    /* Header */
    .header{background:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.1);flex-shrink:0;z-index:10}
    .header-title{font-size:1rem;font-weight:700;color:#1a1a2e}
    .profile-toggle{display:flex;background:#f3f4f6;border-radius:20px;padding:3px;gap:2px}
    .profile-btn{padding:5px 12px;border:none;border-radius:16px;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;background:transparent;color:#888}
    .profile-btn.active{background:#fff;color:#333;box-shadow:0 1px 4px rgba(0,0,0,.15)}

    /* Chat */
    .chat-area{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}

    /* Bubbles */
    .brow{display:flex;align-items:flex-start}
    .brow.user{justify-content:flex-end}
    .bavatar{width:28px;height:28px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-right:8px;margin-top:2px}
    .bubble{max-width:78%;padding:11px 15px;border-radius:18px;font-size:.9rem;line-height:1.6;word-break:break-word}
    .bubble.user{background:#DCF8C6;border-bottom-right-radius:4px;color:#1a1a2e}
    .bubble.ai{background:#fff;border-bottom-left-radius:4px;color:#1a1a2e;box-shadow:0 1px 3px rgba(0,0,0,.1)}
    .bubble.err{background:#FEE2E2;color:#991B1B}
    .bubble.sys{background:#EFF6FF;color:#1e40af;font-size:.82rem;text-align:center;border-radius:12px;align-self:center;max-width:90%;padding:8px 16px}
    .ldots{display:flex;gap:5px;align-items:center;padding:4px 2px}
    .ldot{width:7px;height:7px;border-radius:50%;background:#9ca3af;animation:bounce 1.4s infinite}
    .ldot:nth-child(2){animation-delay:.2s}
    .ldot:nth-child(3){animation-delay:.4s}

    /* Bottom */
    .bottom{background:#fff;padding:14px 20px 32px;box-shadow:0 -1px 4px rgba(0,0,0,.1);flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:10px}
    .mic-wrap{position:relative;display:flex;flex-direction:column;align-items:center;gap:10px}
    .mic-btn{width:80px;height:80px;border-radius:50%;border:none;font-size:2.4rem;cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,.2)}
    .mic-btn.ready{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff}
    .mic-btn.recording{background:#ef4444;color:#fff;animation:ripple 1.5s infinite}
    .mic-btn.processing{background:#e5e7eb;color:#9ca3af;cursor:not-allowed;box-shadow:none}
    .mic-btn.speaking{background:#3b82f6;color:#fff}
    .mic-btn:active:not(.processing){transform:scale(.92)}
    .mic-lbl{font-size:.78rem;font-weight:500;color:#6b7280;text-align:center}
    .rec-timer{font-size:.72rem;color:#ef4444;font-weight:600;display:none}

    /* Settings Modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
    .modal-sheet{background:#fff;border-radius:24px 24px 0 0;padding:28px 24px 44px;width:100%;max-width:500px}
    .modal-title{font-size:1rem;font-weight:700;color:#1a1a2e;margin-bottom:16px}
    .modal-label{font-size:.78rem;font-weight:600;color:#555;margin-bottom:5px;display:block}
    .modal-input{width:100%;padding:10px 14px;border:2px solid #e5e7eb;border-radius:10px;font-size:.82rem;font-family:monospace;color:#333;margin-bottom:8px}
    .modal-input:focus{outline:none;border-color:#667eea}
    .modal-hint{font-size:.72rem;color:#9ca3af;margin-bottom:12px;line-height:1.5}
    .modal-presets{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
    .preset-btn{padding:8px 12px;background:#f3f4f6;border:1.5px solid #e5e7eb;border-radius:8px;font-size:.75rem;font-family:monospace;color:#374151;cursor:pointer;text-align:left;transition:all .15s}
    .preset-btn:active{background:#ede9fe;border-color:#667eea}
    .modal-row{display:flex;gap:8px}
    .modal-save{flex:1;padding:12px;background:#667eea;color:#fff;border:none;border-radius:12px;font-size:.9rem;font-weight:700;cursor:pointer}
    .modal-cancel{padding:12px 18px;background:#f3f4f6;color:#374151;border:none;border-radius:12px;font-size:.9rem;font-weight:600;cursor:pointer}
    .gear-btn{background:none;border:none;font-size:1.1rem;cursor:pointer;color:#9ca3af;padding:4px}
    .model-tag{font-size:.68rem;color:#9ca3af;margin-top:2px}

    /* Animations */
    @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-7px)}}
    @keyframes ripple{0%{box-shadow:0 0 0 0 rgba(239,68,68,.45)}70%{box-shadow:0 0 0 20px rgba(239,68,68,0)}100%{box-shadow:0 0 0 0 rgba(239,68,68,0)}}
    .hidden{display:none!important}
  </style>
</head>
<body>

<!-- ═══ Setup ═══ -->
<div id="setup-screen">
  <div class="card">
    <div class="card-logo">🗣️</div>
    <div class="card-title">영어 말하기 친구</div>
    <div class="card-sub">마이크로 말하면 Gemini AI가 영어로 도와줘요</div>
    <label class="field-label" for="key-inp">Gemini API 키</label>
    <input id="key-inp" type="password" class="field-input" placeholder="AIza..." autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="field-note">
      API 키는 이 기기에만 저장됩니다.<br>
      발급: <a href="https://aistudio.google.com/app/apikey" target="_blank">Google AI Studio →</a>
    </div>
    <button class="btn-primary" onclick="saveKey()">시작하기 🚀</button>
    <div id="setup-err" class="setup-err"></div>
  </div>
</div>

<!-- ═══ Main ═══ -->
<div id="main-screen" class="hidden">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="header-title">🗣️ 영어 말하기 친구</div>
      <div id="model-tag" class="model-tag"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="gear-btn" onclick="openSettings()" title="설정">⚙️</button>
      <div class="profile-toggle">
        <button id="btn-joy" class="profile-btn active" onclick="switchProfile('joy')">🌸 기쁨이</button>
        <button id="btn-dad" class="profile-btn" onclick="switchProfile('dad')">👨 아빠</button>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chat"></div>

  <!-- Bottom -->
  <div class="bottom">
    <div class="mic-wrap">
      <button id="mic-btn" class="mic-btn ready" onclick="toggleMic()">🎤</button>
      <div id="mic-lbl" class="mic-lbl">탭하여 말하기</div>
      <div id="rec-timer" class="rec-timer"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-bg hidden" onclick="outsideClose(event)">
    <div class="modal-sheet">
      <div class="modal-title">⚙️ 설정</div>
      <label class="modal-label">Gemini 모델</label>
      <input id="model-inp" class="modal-input" placeholder="gemini-3.1-flash-lite-preview">
      <div class="modal-hint">아래 프리셋을 탭하여 선택하세요 (gemini-3.1-flash-lite-preview 권장)</div>
      <div class="modal-presets">
        <button class="preset-btn" onclick="pickModel('gemini-3.1-flash-lite-preview')">gemini-3.1-flash-lite-preview ✅ 권장</button>
        <button class="preset-btn" onclick="pickModel('gemini-2.5-flash-preview-05-20')">gemini-2.5-flash-preview-05-20</button>
        <button class="preset-btn" onclick="pickModel('gemini-2.0-flash')">gemini-2.0-flash</button>
        <button class="preset-btn" onclick="pickModel('gemini-2.0-flash-lite')">gemini-2.0-flash-lite</button>
      </div>
      <label class="modal-label">API 키 변경</label>
      <input id="key-change-inp" type="password" class="modal-input" placeholder="새 API 키 (변경 시에만 입력)">
      <div class="modal-row">
        <button class="modal-cancel" onclick="closeSettings()">취소</button>
        <button class="modal-save" onclick="saveSettings()">저장</button>
      </div>
    </div>
  </div>

</div>

<script>
/* ══════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════ */
const API_BASE = 'https://generativelanguage.googleapis.com/v1beta/models';

/* ══════════════════════════════════════════
   SYSTEM PROMPTS  (plain text, no JSON)
══════════════════════════════════════════ */
const JOY_PROMPT = `You are 기쁨이's warm and playful English teacher. 기쁨이 is 6 years old and learning English in Korea. The user sends voice audio — understand what was said and respond conversationally.

Rules:
- If they speak Korean: briefly explain in simple Korean, then say the English expression clearly and a bit slowly. Repeat the English word or phrase at least once.
- If they speak English: praise warmly and respond simply in English.
- Only use Grade 1 vocabulary: cat, dog, water, school, happy, big, small, go, come, eat, play, etc.
- Keep every response to 2–3 short sentences maximum.
- Be extremely warm, fun, and encouraging. Sometimes say "기쁨아".
- Respond in plain conversational text only — no JSON, no markdown, no bullet points.
- Example: "오, 고양이! 영어로는 cat이에요! Cat! 같이 말해봐요, cat!"`;

const DAD_PROMPT = `You are a friendly English conversation partner and coach for a Korean adult. The user sends voice audio — understand what was said and respond conversationally.

Rules:
- If they speak Korean: briefly explain in Korean, then give the natural English expression.
- If they speak English with errors: gently offer a more natural phrasing — say "You could also say..." Never say wrong or incorrect.
- If their English sounds natural and fluent: respond entirely in English for immersion.
- Adult vocabulary. Conversational and genuine.
- Keep responses to 3–5 sentences.
- Respond in plain conversational text only — no JSON, no markdown.`;

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
const S = {
  profile:  localStorage.getItem('elf_profile') || 'joy',
  apiKey:   localStorage.getItem('elf_apikey')  || '',
  model:    localStorage.getItem('elf_model')   || 'gemini-3.1-flash-lite-preview',
  micState: 'ready',   // ready | recording | processing | speaking
  recorder: null,
  audioChunks: [],
  recInterval: null,
  recSecs: 0,
  chatHistory: [],    // [{role, parts:[{text}]}] — text only, max 12 items
};

/* ══════════════════════════════════════════
   SETUP
══════════════════════════════════════════ */
function saveKey() {
  const k = document.getElementById('key-inp').value.trim();
  if (!k.startsWith('AIza')) { showSetupErr('API 키 형식이 올바르지 않아요 (AIza... 로 시작해야 합니다)'); return; }
  S.apiKey = k;
  localStorage.setItem('elf_apikey', k);
  goMain();
}
function showSetupErr(msg) {
  const el = document.getElementById('setup-err');
  el.textContent = msg; el.style.display = 'block';
}
function goMain() {
  document.getElementById('setup-screen').classList.add('hidden');
  document.getElementById('main-screen').classList.remove('hidden');
  applyProfile(S.profile);
  updateModelTag();
  sysBubble(S.profile === 'joy'
    ? '안녕! 🌸 마이크 버튼을 탭하고 말해보세요!'
    : '안녕하세요! 👨 마이크 버튼을 탭하고 말해보세요!');
}

/* ══════════════════════════════════════════
   PROFILE
══════════════════════════════════════════ */
function switchProfile(p) {
  if (S.profile === p) return;
  S.profile = p;
  localStorage.setItem('elf_profile', p);
  applyProfile(p);
  S.chatHistory = [];
  clearChat();
}
function applyProfile(p) {
  document.getElementById('btn-joy').classList.toggle('active', p === 'joy');
  document.getElementById('btn-dad').classList.toggle('active', p === 'dad');
}

/* ══════════════════════════════════════════
   MIC — TOGGLE
══════════════════════════════════════════ */
async function toggleMic() {
  if (S.micState === 'processing' || S.micState === 'speaking') return;
  if (S.micState === 'recording') {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    // Detect best supported MIME type
    const mime =
      MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' :
      MediaRecorder.isTypeSupported('audio/webm')             ? 'audio/webm' :
      MediaRecorder.isTypeSupported('audio/mp4')              ? 'audio/mp4'  : '';

    S.audioChunks = [];
    S.recorder = new MediaRecorder(stream, mime ? { mimeType: mime } : {});

    S.recorder.ondataavailable = (e) => { if (e.data.size > 0) S.audioChunks.push(e.data); };

    S.recorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blobType = S.recorder.mimeType || mime || 'audio/webm';
      const blob = new Blob(S.audioChunks, { type: blobType });
      await sendToGemini(blob);
    };

    S.recorder.start(100);  // collect data every 100ms
    setMicState('recording');

    // Recording timer
    S.recSecs = 0;
    updateTimer();
    S.recInterval = setInterval(() => {
      S.recSecs++;
      updateTimer();
      if (S.recSecs >= 60) stopRecording(); // auto-stop at 60s
    }, 1000);

  } catch(err) {
    console.error('Mic error:', err);
    if (err.name === 'NotAllowedError') errBubble('마이크 권한이 필요해요. 브라우저 설정에서 허용해주세요.');
    else if (err.name === 'NotFoundError') errBubble('마이크를 찾을 수 없어요.');
    else errBubble('마이크 오류: ' + err.message);
  }
}

function stopRecording() {
  clearInterval(S.recInterval);
  document.getElementById('rec-timer').style.display = 'none';
  if (S.recorder && S.recorder.state !== 'inactive') {
    S.recorder.stop();
    setMicState('processing');
  }
}

function updateTimer() {
  const el = document.getElementById('rec-timer');
  el.style.display = 'block';
  const m = Math.floor(S.recSecs / 60).toString().padStart(2,'0');
  const s = (S.recSecs % 60).toString().padStart(2,'0');
  el.textContent = `${m}:${s}`;
}

/* ══════════════════════════════════════════
   GEMINI API — AUDIO INPUT
══════════════════════════════════════════ */
async function sendToGemini(audioBlob) {
  // Show user bubble (placeholder)
  const userRow = addUserBubble('🎤 음성 메시지');
  // Show loading bubble
  const loadRow = addLoadingBubble();

  try {
    const base64Audio = await blobToBase64(audioBlob);
    // Clean MIME type (remove codecs suffix)
    const cleanMime = audioBlob.type.split(';')[0] || 'audio/webm';

    // Build contents: history + current audio
    const contents = [
      ...S.chatHistory,
      {
        role: 'user',
        parts: [{ inlineData: { mimeType: cleanMime, data: base64Audio } }]
      }
    ];

    const body = {
      contents,
      systemInstruction: {
        parts: [{ text: S.profile === 'joy' ? JOY_PROMPT : DAD_PROMPT }]
      },
      generationConfig: {
        temperature: 0.7,
        maxOutputTokens: 800
      }
    };

    const res = await fetch(`${API_BASE}/${S.model}:generateContent?key=${S.apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || `HTTP ${res.status}`);

    const aiText = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
    if (!aiText) throw new Error('응답이 비어 있어요.');

    // Update bubbles
    replaceLoading(loadRow, aiText);

    // Update history (text only, no audio blobs)
    S.chatHistory.push(
      { role: 'user',  parts: [{ text: '🎤 음성 입력' }] },
      { role: 'model', parts: [{ text: aiText }] }
    );
    if (S.chatHistory.length > 12) S.chatHistory = S.chatHistory.slice(-12);

    // Speak response
    setMicState('speaking');
    speak(aiText, S.profile, () => setMicState('ready'));

  } catch(err) {
    console.error('Gemini error:', err);
    replaceLoading(loadRow, null);
    errBubble('오류: ' + err.message);
    setMicState('ready');
  }
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

/* ══════════════════════════════════════════
   TTS — 한국어/영어 분리 발화
══════════════════════════════════════════ */
function speak(text, profile, onDone) {
  window.speechSynthesis.cancel();
  const segments = splitKoEn(text);
  if (segments.length === 0) { onDone?.(); return; }

  let i = 0;
  function next() {
    if (i >= segments.length) { onDone?.(); return; }
    const seg = segments[i++];
    const u = new SpeechSynthesisUtterance(seg.text);
    u.lang  = seg.lang;
    u.rate  = seg.lang === 'en-US' ? (profile === 'joy' ? 0.75 : 0.88) : 0.85;
    u.pitch = profile === 'joy' ? 1.1 : 1.0;
    u.onend = next;
    u.onerror = next;  // skip on error
    window.speechSynthesis.speak(u);
  }
  next();
}

function splitKoEn(text) {
  if (!text) return [];
  // Split on sentence boundaries
  const raw = text.split(/(?<=[.!?。\n])\s*/);
  const segments = [];
  for (const s of raw) {
    const t = s.trim();
    if (!t) continue;
    const korean = (t.match(/[가-힣]/g) || []).length;
    const total  = t.replace(/\s/g, '').length;
    segments.push({
      text: t,
      lang: total > 0 && korean / total > 0.15 ? 'ko-KR' : 'en-US'
    });
  }
  return segments;
}

/* ══════════════════════════════════════════
   UI HELPERS
══════════════════════════════════════════ */
const chatEl = () => document.getElementById('chat');
function scrollBottom() { requestAnimationFrame(() => { chatEl().scrollTop = chatEl().scrollHeight; }); }

function addUserBubble(text) {
  const row = document.createElement('div');
  row.className = 'brow user';
  const b = document.createElement('div');
  b.className = 'bubble user';
  b.textContent = text;
  row.appendChild(b);
  chatEl().appendChild(row);
  scrollBottom();
  return row;
}

function addLoadingBubble() {
  const row = document.createElement('div');
  row.className = 'brow';
  const av = document.createElement('div');
  av.className = 'bavatar';
  av.textContent = S.profile === 'joy' ? '🌸' : '🤖';
  const b = document.createElement('div');
  b.className = 'bubble ai';
  b.innerHTML = '<div class="ldots"><div class="ldot"></div><div class="ldot"></div><div class="ldot"></div></div>';
  row.appendChild(av); row.appendChild(b);
  chatEl().appendChild(row);
  scrollBottom();
  return row;
}

function replaceLoading(rowEl, text) {
  if (!rowEl) return;
  if (text === null) { rowEl.remove(); return; }
  const b = rowEl.querySelector('.bubble');
  if (b) { b.textContent = text; scrollBottom(); }
}

function sysBubble(text) {
  const b = document.createElement('div');
  b.className = 'bubble sys';
  b.textContent = text;
  chatEl().appendChild(b);
  scrollBottom();
}

function errBubble(text) {
  const row = document.createElement('div');
  row.className = 'brow';
  const b = document.createElement('div');
  b.className = 'bubble err';
  b.textContent = text;
  row.appendChild(b);
  chatEl().appendChild(row);
  scrollBottom();
}

function clearChat() {
  chatEl().innerHTML = '';
  sysBubble(S.profile === 'joy'
    ? '기쁨이 모드 🌸 마이크 버튼을 탭하고 영어로 뭔가 물어보세요!'
    : '아빠 모드 👨 마이크 버튼을 탭하고 말해보세요!');
}

function setMicState(state) {
  S.micState = state;
  const btn = document.getElementById('mic-btn');
  const lbl = document.getElementById('mic-lbl');
  btn.className = 'mic-btn ' + state;
  switch(state) {
    case 'ready':      btn.textContent = '🎤'; lbl.textContent = '탭하여 말하기'; break;
    case 'recording':  btn.textContent = '🎙️'; lbl.textContent = '녹음 중... (탭하여 전송)'; break;
    case 'processing': btn.textContent = '⏳'; lbl.textContent = 'AI 생각 중...'; break;
    case 'speaking':   btn.textContent = '🔊'; lbl.textContent = '읽는 중... (탭하여 중지)'; break;
  }
}

/* ══════════════════════════════════════════
   SETTINGS MODAL
══════════════════════════════════════════ */
function openSettings() {
  document.getElementById('model-inp').value = S.model;
  document.getElementById('key-change-inp').value = '';
  document.getElementById('settings-modal').classList.remove('hidden');
}
function closeSettings() {
  document.getElementById('settings-modal').classList.add('hidden');
}
function outsideClose(e) {
  if (e.target === document.getElementById('settings-modal')) closeSettings();
}
function pickModel(name) {
  document.getElementById('model-inp').value = name;
}
function saveSettings() {
  const m = document.getElementById('model-inp').value.trim();
  const k = document.getElementById('key-change-inp').value.trim();
  if (m) { S.model = m; localStorage.setItem('elf_model', m); }
  if (k && k.startsWith('AIza')) { S.apiKey = k; localStorage.setItem('elf_apikey', k); }
  updateModelTag();
  closeSettings();
  sysBubble(`설정 저장됨 — 모델: ${S.model}`);
}
function updateModelTag() {
  document.getElementById('model-tag').textContent = S.model;
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
(function init() {
  if (S.apiKey) goMain();
  document.getElementById('key-inp').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveKey();
  });

  // Stop TTS when mic tapped during speaking
  document.getElementById('mic-btn').addEventListener('click', () => {
    if (S.micState === 'speaking') {
      window.speechSynthesis.cancel();
      setMicState('ready');
    }
  }, true);
})();
</script>
</body>
