<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>기쁨이의 수학 나라 ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FFF9F0;
  --card: #FFFFFF;
  --border: #FFE0B2;
  --text: #3D2B1F;
  --muted: #A08070;
  --gold: #FFB300;
  --green: #4CAF50;
  --red: #FF6B6B;
  --radius: 28px;
  --font: 'Gaegu', sans-serif;
}
* { box-sizing: border-box; margin:0; padding:0; -webkit-tap-highlight-color: transparent; }
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }
body { font-family: var(--font); color: var(--text); touch-action: manipulation; }

.screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; overflow-y:auto; }
.screen.active { display:flex; }

/* ── 공통 ── */
.big-btn { font-family:var(--font); font-weight:700; border:none; border-radius:999px; cursor:pointer;
  transition: transform .12s; box-shadow: 0 6px 0 rgba(0,0,0,.12); }
.big-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0,0,0,.12); }

/* ── 타이틀 ── */
#title-screen .mascot { font-size: 6rem; animation: bob 2.4s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }
#title-screen h1 { font-size: clamp(2.4rem,8vw,3.2rem); margin: 8px 0 4px; color:var(--text); }
#title-screen p { color: var(--muted); font-size: 1.2rem; margin-bottom: 32px; }
.start-btn { background: var(--gold); color:#fff; font-size:1.6rem; padding: 22px 56px; }

/* ── 지도 ── */
#map-screen { padding: 20px 16px; justify-content:flex-start; }
.map-top { width:100%; max-width: 640px; display:flex; align-items:center; gap:12px; margin-bottom: 18px; }
.mascot-mini { font-size: 2.6rem; }
.map-title { font-size: 1.5rem; flex:1; }

.sem-label { width:100%; max-width:640px; font-size:1.3rem; color: var(--muted); margin: 14px 0 8px; }
.sem-label:first-of-type { margin-top:0; }

.unit-grid { width:100%; max-width:640px; display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width:520px){ .unit-grid{ grid-template-columns: 1fr; } }

.unit-card { background: var(--card); border-radius: var(--radius); border: 4px solid var(--ucolor,var(--border));
  padding: 18px 16px; text-align:center; box-shadow: 0 6px 0 rgba(0,0,0,.06); min-height: 148px;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; cursor:pointer; }
.unit-card:active { transform: translateY(3px); }
.unit-icon { font-size: 2.6rem; }
.unit-name { font-size: 1.15rem; line-height:1.25; }
.unit-stars { font-size: 1.1rem; color: var(--gold); }

/* ── 문제 화면 ── */
#quiz-screen { padding: 16px; }
.quiz-top { width:100%; max-width: 560px; display:flex; align-items:center; gap:10px; margin-bottom: 18px; }
.back-mini { width:48px; height:48px; border-radius:50%; background:var(--card); border:3px solid var(--border);
  font-size:1.3rem; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.progress-wrap { flex:1; height:18px; background:var(--card); border:3px solid var(--border); border-radius:99px; overflow:hidden; }
.progress-bar { height:100%; background: linear-gradient(90deg,#FFD166,#FFB300); border-radius:99px; transition: width .3s; }
.quiz-stars { font-size:1.3rem; color: var(--gold); min-width: 60px; text-align:right; }

.quiz-card { background: var(--card); border-radius: var(--radius); border: 4px solid var(--border);
  padding: 28px 20px; width: 100%; max-width: 560px; text-align:center; box-shadow: 0 8px 0 rgba(0,0,0,.06); }
.mascot-say { font-size: 3.2rem; margin-bottom: 4px; }
.quiz-q { font-size: clamp(1.6rem,6.5vw,2.2rem); line-height:1.35; margin: 10px 0 18px; min-height: 50px; }
.quiz-q .blank { display:inline-block; min-width:44px; border-bottom:5px solid var(--gold); color:var(--gold); }
.quiz-q .op-plus { color: var(--green); } .quiz-q .op-minus { color: var(--red); }
.quiz-visual { display:flex; justify-content:center; flex-wrap:wrap; gap:8px; margin-bottom:14px; min-height:0; }
.pv-dot { width:20px; height:20px; border-radius:50%; animation: pop .25s backwards; }
@keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
.quiz-canvas-wrap { display:flex; justify-content:center; margin-bottom: 10px; }

.choice-grid { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 6px; }
.choice-grid.two { grid-template-columns: 1fr 1fr; }
.choice-grid.wide { grid-template-columns: 1fr; }
.choice-btn { background:#FFF3DC; border:4px solid var(--border); border-radius: 20px; min-height: 92px;
  font-family:var(--font); font-weight:700; font-size: 1.6rem; color:var(--text); cursor:pointer;
  box-shadow: 0 6px 0 rgba(0,0,0,.08); transition: transform .1s; display:flex; align-items:center; justify-content:center; padding:8px 10px; }
.choice-btn:active { transform: translateY(4px); box-shadow:0 2px 0 rgba(0,0,0,.08); }
.choice-btn.correct { background: #E4F8E1; border-color: var(--green); }
.choice-btn.wrong   { background: #FFE3E3; border-color: var(--red); }

.feedback-banner { position: fixed; top: 24px; left:50%; transform:translateX(-50%);
  font-size: 1.6rem; font-weight:700; padding: 10px 26px; border-radius:99px; z-index:50;
  animation: bannerpop .9s ease forwards; pointer-events:none; }
@keyframes bannerpop { 0%{opacity:0;transform:translate(-50%,-14px) scale(.8)} 15%{opacity:1;transform:translate(-50%,0) scale(1.05)}
  25%{transform:translate(-50%,0) scale(1)} 80%{opacity:1} 100%{opacity:0;transform:translate(-50%,-6px) scale(1)} }
.fb-ok { background:#E4F8E1; color:#2E7D32; }
.fb-no { background:#FFF0DC; color:#B26A00; }

/* ── 완료 화면 ── */
#done-screen .mascot { font-size: 5.5rem; }
.done-card { background: var(--card); border-radius: var(--radius); border:4px solid var(--gold); padding: 32px 26px;
  text-align:center; max-width: 420px; width:100%; box-shadow:0 8px 0 rgba(0,0,0,.08); }
.done-title { font-size: 1.9rem; margin: 8px 0 6px; }
.done-stars { font-size: 2.6rem; margin: 10px 0 18px; }
.done-sub { color: var(--muted); font-size:1.15rem; margin-bottom: 22px; }
.done-btn { background: var(--gold); color:#fff; font-size:1.3rem; padding:16px 40px; }

/* ── 폭죽 ── */
.confetti { position: fixed; pointer-events:none; z-index:60; width:10px; height:14px; border-radius:3px;
  animation: conf-fall var(--dur,1.6s) ease-in var(--del,0s) forwards; }
@keyframes conf-fall { 0%{transform:translateY(-10px) rotate(0);opacity:1} 100%{transform:translateY(105vh) rotate(480deg);opacity:0} }

::-webkit-scrollbar{width:0;height:0}
</style>
<style id="joy-back-btn-style">
  #joy-back { position: fixed; top: 14px; left: 14px; z-index: 9999; background: #FF6B6B; color: #fff; border: none;
    border-radius: 99px; padding: 10px 20px; font-family: 'Gaegu', cursive; font-size: 1.1rem; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 16px rgba(255,107,107,.4); display: flex; align-items: center; gap: 6px;
    transition: transform .18s; text-decoration: none; }
  #joy-back:hover { transform: scale(1.07); }
  #joy-back:active { transform: scale(.95); }
</style>
</head>
<body>
<a id="joy-back" href="https://drumismylife.github.io/Joy/" title="메인으로 돌아가기">🏠 메인</a>

<!-- ═══ 타이틀 ═══ -->
<div class="screen active" id="title-screen">
  <div class="mascot">🦉</div>
  <h1>기쁨이의 수학 나라</h1>
  <p>부엉이 친구와 함께 2학년 수학을 배워요!</p>
  <button class="big-btn start-btn" onclick="goMap()">시작하기 ✨</button>
</div>

<!-- ═══ 지도 ═══ -->
<div class="screen" id="map-screen">
  <div class="map-top">
    <div class="mascot-mini">🦉</div>
    <div class="map-title">어디로 가볼까요?</div>
  </div>
  <div class="unit-grid" id="unit-grid"></div>
</div>

<!-- ═══ 문제 ═══ -->
<div class="screen" id="quiz-screen">
  <div class="quiz-top">
    <div class="back-mini" onclick="goMap()">←</div>
    <div class="progress-wrap"><div class="progress-bar" id="quiz-progress" style="width:0%"></div></div>
    <div class="quiz-stars" id="quiz-star-count">⭐ 0</div>
  </div>
  <div class="quiz-card">
    <div class="mascot-say" id="quiz-mascot">🦉</div>
    <div class="quiz-q" id="quiz-q">문제</div>
    <div class="quiz-visual" id="quiz-visual"></div>
    <div class="quiz-canvas-wrap" id="quiz-canvas-wrap" style="display:none"><canvas id="quiz-canvas" width="220" height="220"></canvas></div>
    <div class="choice-grid" id="quiz-choices"></div>
  </div>
</div>

<!-- ═══ 완료 ═══ -->
<div class="screen" id="done-screen">
  <div class="mascot">🎉</div>
  <div class="done-card">
    <div class="done-title" id="done-title">완료했어요!</div>
    <div class="done-stars" id="done-stars">⭐⭐⭐</div>
    <div class="done-sub" id="done-sub">정말 잘했어요!</div>
    <button class="big-btn done-btn" onclick="goMap()">지도로 돌아가기</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  단원 정의 (초2 수학 12단원, 1학기 6 + 2학기 6)
// ════════════════════════════════════════════════════════
const UNITS = [
  { id:'s1u1', sem:1, icon:'🔢', name:'세 자리 수', color:'#FF8866', kind:'numsense', cfg:{min:100,max:999,types:['compare','place','order']} },
  { id:'s1u2', sem:1, icon:'🔺', name:'여러 가지 도형', color:'#44CCAA', kind:'shape', set:'plane2' },
  { id:'s1u3', sem:1, icon:'➕', name:'덧셈과 뺄셈', color:'#FF6666', kind:'addsub', cfg:{mode:'carry'} },
  { id:'s1u4', sem:1, icon:'📏', name:'길이 재기', color:'#66DDFF', kind:'length' },
  { id:'s1u5', sem:1, icon:'🗂️', name:'분류하기', color:'#B388FF', kind:'classify' },
  { id:'s1u6', sem:1, icon:'✖️', name:'곱셈', color:'#FFB74D', kind:'multiply', cfg:{stage:'concept'} },
  { id:'s2u1', sem:2, icon:'🏔️', name:'네 자리 수', color:'#8866FF', kind:'numsense', cfg:{min:1000,max:9999,types:['compare','place','order']} },
  { id:'s2u2', sem:2, icon:'🧮', name:'곱셈구구', color:'#FF8844', kind:'multiply', cfg:{stage:'table'} },
  { id:'s2u3', sem:2, icon:'📐', name:'길이 재기', color:'#66DDFF', kind:'length' },
  { id:'s2u4', sem:2, icon:'🕐', name:'시각과 시간', color:'#CC66FF', kind:'clock' },
  { id:'s2u5', sem:2, icon:'📊', name:'표와 그래프', color:'#4CAF50', kind:'graph' },
  { id:'s2u6', sem:2, icon:'👑', name:'규칙 찾기', color:'#FF66CC', kind:'pattern' },
];
const QUESTIONS_PER_SESSION = 8;
const COLORS = ['#FF6B6B','#FFD166','#4CAF50','#4488FF','#FF9F1C','#CC66FF','#FF66CC','#44CCAA'];
const SAY_OK = ['참 잘했어요! ⭐','정답이에요! 🎉','최고예요! 👏','바로 그거예요! ✨'];
const SAY_NO = ['다시 해볼까요? 🤔','괜찮아요, 한 번 더! 💪','조금만 더 생각해봐요 😊'];

// ════════════════════════════════════════════════════════
//  진행상황 저장 (localStorage)
// ════════════════════════════════════════════════════════
function loadStars() { try { return JSON.parse(localStorage.getItem('joyMathStars2')||'{}'); } catch(e){ return {}; } }
function saveStars(obj) { localStorage.setItem('joyMathStars2', JSON.stringify(obj)); }
let STARS = loadStars();

// ════════════════════════════════════════════════════════
//  화면 전환
// ════════════════════════════════════════════════════════
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goMap(){ renderMap(); showScreen('map-screen'); }

function renderMap(){
  const grid = document.getElementById('unit-grid');
  const wrap = document.getElementById('map-screen');
  wrap.querySelectorAll('.sem-label').forEach(el=>el.remove());
  grid.innerHTML='';
  let lastSem=0;
  UNITS.forEach(u=>{
    if(u.sem!==lastSem){
      lastSem=u.sem;
      const label=document.createElement('div');
      label.className='sem-label'; label.textContent = lastSem===1?'📘 1학기':'📗 2학기';
      wrap.insertBefore(label, grid);
    }
    const stars = STARS[u.id]||0;
    const card=document.createElement('div');
    card.className='unit-card'; card.style.setProperty('--ucolor',u.color);
    card.onclick=()=>startUnit(u.id);
    card.innerHTML = `<div class="unit-icon">${u.icon}</div><div class="unit-name">${u.name}</div>
      <div class="unit-stars">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>`;
    grid.appendChild(card);
  });
}

// ════════════════════════════════════════════════════════
//  퀴즈 세션 상태
// ════════════════════════════════════════════════════════
let Q = { unit:null, idx:0, correct:0, current:null };

function startUnit(unitId){
  Q = { unit: UNITS.find(u=>u.id===unitId), idx:0, correct:0, current:null };
  document.getElementById('quiz-star-count').textContent = `⭐ ${STARS[unitId]||0}`;
  showScreen('quiz-screen');
  nextQuestion();
}

function nextQuestion(){
  if(Q.idx >= QUESTIONS_PER_SESSION){ finishUnit(); return; }
  document.getElementById('quiz-progress').style.width = (Q.idx/QUESTIONS_PER_SESSION*100)+'%';
  const p = genQuestion(Q.unit);
  Q.current = p;
  document.getElementById('quiz-mascot').textContent = Q.unit.icon;
  document.getElementById('quiz-q').innerHTML = p.q;
  document.getElementById('quiz-visual').innerHTML = p.visual || '';
  const canvasWrap = document.getElementById('quiz-canvas-wrap');
  if(p.draw){ canvasWrap.style.display='flex'; p.draw(document.getElementById('quiz-canvas')); }
  else { canvasWrap.style.display='none'; }

  const row = document.getElementById('quiz-choices');
  row.innerHTML='';
  row.classList.toggle('two', p.choices.length<=2);
  row.classList.toggle('wide', !!p.wide);
  p.choices.forEach(c=>{
    const btn=document.createElement('button');
    btn.className='choice-btn'; btn.textContent=c;
    btn.onclick=()=>onChoice(c, btn);
    row.appendChild(btn);
  });
}

function onChoice(val, btn){
  document.querySelectorAll('#quiz-choices .choice-btn').forEach(b=>b.onclick=null);
  const correct = String(val) === String(Q.current.ans);
  if(correct){
    btn.classList.add('correct');
    Q.correct++;
    banner(SAY_OK[Math.floor(Math.random()*SAY_OK.length)], 'fb-ok');
    spawnConfetti();
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('#quiz-choices .choice-btn').forEach(b=>{
      if(String(b.textContent)===String(Q.current.ans)) b.classList.add('correct');
    });
    banner(SAY_NO[Math.floor(Math.random()*SAY_NO.length)], 'fb-no');
  }
  Q.idx++;
  setTimeout(()=>nextQuestion(), 1100);
}

function banner(text, cls){
  const el=document.createElement('div');
  el.className='feedback-banner '+cls; el.textContent=text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 900);
}
function spawnConfetti(){
  for(let i=0;i<16;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.cssText=`left:${Math.random()*100}%;background:${COLORS[i%COLORS.length]};--dur:${Math.random()*.8+1}s;--del:${Math.random()*.2}s`;
    document.body.appendChild(c); setTimeout(()=>c.remove(),1800);
  }
}

function finishUnit(){
  const ratio = Q.correct / QUESTIONS_PER_SESSION;
  const stars = ratio>=0.9?3 : ratio>=0.6?2 : ratio>=0.3?1 : 0;
  const prev = STARS[Q.unit.id]||0;
  STARS[Q.unit.id] = Math.max(prev, stars);
  saveStars(STARS);
  document.getElementById('done-title').textContent = `${Q.unit.name} 완료!`;
  document.getElementById('done-stars').textContent = '⭐'.repeat(stars) + '☆'.repeat(3-stars);
  document.getElementById('done-sub').textContent = `${QUESTIONS_PER_SESSION}문제 중 ${Q.correct}개를 맞혔어요!`;
  if(stars>=2) spawnConfetti();
  showScreen('done-screen');
}

// ════════════════════════════════════════════════════════
//  문제 생성 — 단원 종류(kind)별 디스패치
// ════════════════════════════════════════════════════════
function genQuestion(unit){
  if(unit.kind==='addsub') return genAddSub(unit.cfg);
  if(unit.kind==='numsense') return genNumberSense(unit.cfg);
  if(unit.kind==='shape') return genShapeQ(unit.set);
  if(unit.kind==='length') return genLength();
  if(unit.kind==='classify') return genClassify();
  if(unit.kind==='multiply') return genMultiply(unit.cfg);
  if(unit.kind==='clock') return genClockQ();
  if(unit.kind==='graph') return genGraph();
  if(unit.kind==='pattern') return genPattern();
}

// ── 덧셈과 뺄셈 (받아올림·받아내림 있음, 초2 수준) ──
function genAddSub(cfg){
  const useSub = Math.random()>0.5;
  let a,b,ans,visual='';
  if(useSub){
    // 두 자리 - 두 자리, 받아내림 포함 가능
    a = 20 + Math.floor(Math.random()*79); // 20~98
    b = 10 + Math.floor(Math.random()*(a-9)); // b < a, at least 10
    if (b>=a) b = Math.max(10, a-10);
    ans = a-b;
  } else {
    // 두 자리 + 두 자리, 받아올림 포함 가능 (합이 세 자리까지 갈 수 있음)
    a = 10 + Math.floor(Math.random()*89);
    b = 10 + Math.floor(Math.random()*89);
    ans = a+b;
  }
  const opSym=useSub?'−':'+', opCls=useSub?'op-minus':'op-plus';
  const q = `${a} <span class="${opCls}">${opSym}</span> ${b} = <span class="blank">?</span>`;
  const choices=[ans]; while(choices.length<4){const d=ans+(Math.floor(Math.random()*11)-5);if(d>=0&&!choices.includes(d))choices.push(d);}
  return { q, ans, visual, choices: choices.sort(()=>Math.random()-.5) };
}

// ── 수 감각 (세 자리 / 네 자리 수: 비교·자릿값·순서) ──
function genNumberSense(cfg){
  const types = cfg.types;
  const type = types[Math.floor(Math.random()*types.length)];
  let q='', ans, visual='', choices;

  if(type==='compare'){
    const a=cfg.min+Math.floor(Math.random()*(cfg.max-cfg.min+1));
    let b=cfg.min+Math.floor(Math.random()*(cfg.max-cfg.min+1));
    while(b===a) b=cfg.min+Math.floor(Math.random()*(cfg.max-cfg.min+1));
    const big=Math.random()>0.5;
    q=`${a} 와 ${b}<br>더 ${big?'큰':'작은'} 수는?`;
    ans = big?Math.max(a,b):Math.min(a,b);
    choices=[a,b];
  } else if(type==='place'){
    const n=cfg.min+Math.floor(Math.random()*(cfg.max-cfg.min+1));
    const places = cfg.max>=1000 ? ['천의 자리','백의 자리','십의 자리','일의 자리'] : ['백의 자리','십의 자리','일의 자리'];
    const which = places[Math.floor(Math.random()*places.length)];
    let digit;
    if (which==='일의 자리') digit = n%10;
    else if (which==='십의 자리') digit = Math.floor(n/10)%10;
    else if (which==='백의 자리') digit = Math.floor(n/100)%10;
    else digit = Math.floor(n/1000)%10;
    q=`<span style="font-size:2.2rem">${n}</span><br>${which} 숫자는?`;
    ans = digit;
    choices=[ans]; while(choices.length<4){const d=Math.floor(Math.random()*10);if(!choices.includes(d))choices.push(d);}
  } else {
    const nums=[]; while(nums.length<3){const n=cfg.min+Math.floor(Math.random()*(cfg.max-cfg.min+1));if(!nums.includes(n))nums.push(n);}
    const big=Math.random()>0.5;
    q=`${nums.join(', ')}<br>가장 ${big?'큰':'작은'} 수는?`;
    ans = big?Math.max(...nums):Math.min(...nums);
    choices=[...nums];
  }
  while(choices.length<4){const d=(typeof ans==='number'?ans:0)+(Math.floor(Math.random()*20)-10);if(d>=cfg.min&&!choices.includes(d))choices.push(d);}
  return { q, ans, visual, choices: choices.slice(0,4).sort(()=>Math.random()-.5) };
}

// ── 여러 가지 도형 (평면도형: 삼각형·사각형·오각형·육각형) ──
const PLANE_SHAPES2=[
  {name:'삼각형',sides:3,color:'#FF6B6B'},{name:'사각형',sides:4,color:'#FFD166'},
  {name:'오각형',sides:5,color:'#4CAF50'},{name:'육각형',sides:6,color:'#4488FF'},
];
function genShapeQ(setName){
  const SHAPES = PLANE_SHAPES2;
  const idx=Math.floor(Math.random()*SHAPES.length);
  const shape=SHAPES[idx];
  const askVertex = Math.random()>0.66;
  const askSides = !askVertex && Math.random()>0.5;
  let q, ans, choices;
  if (askVertex){
    q = '꼭짓점이 몇 개일까요?';
    ans = String(shape.sides);
    choices = [...new Set(SHAPES.map(s=>String(s.sides)))].sort(()=>Math.random()-.5);
  } else if (askSides){
    q = '변이 몇 개일까요?';
    ans = String(shape.sides);
    choices = [...new Set(SHAPES.map(s=>String(s.sides)))].sort(()=>Math.random()-.5);
  } else {
    q = '이 도형의 이름은?';
    ans = shape.name;
    choices = SHAPES.map(s=>s.name).sort(()=>Math.random()-.5);
  }
  return { q, ans, visual:'', draw:(cvs)=>drawShape(cvs, shape), choices };
}
function drawShape(cvs, shape){
  const ctx=cvs.getContext('2d'); const W=cvs.width,H=cvs.height,cx=W/2,cy=H/2,r=75;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle=shape.color; ctx.lineWidth=7; ctx.fillStyle=shape.color+'33';
  ctx.beginPath();
  for(let i=0;i<shape.sides;i++){ const a=(i/shape.sides)*Math.PI*2-Math.PI/2; const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); }
  ctx.closePath(); ctx.fill(); ctx.stroke();
}

// ── 길이 재기 (cm·m) ──
function genLength(){
  const type = Math.random();
  if (type < 0.34){
    // cm 덧셈
    const a = 10+Math.floor(Math.random()*40), b = 10+Math.floor(Math.random()*40);
    const q = `${a}cm + ${b}cm = <span class="blank">?</span>cm`;
    const ans = a+b;
    const choices=[ans]; while(choices.length<4){const d=ans+(Math.floor(Math.random()*11)-5);if(d>0&&!choices.includes(d))choices.push(d);}
    return { q, ans, visual:'', choices: choices.sort(()=>Math.random()-.5) };
  } else if (type < 0.67){
    // m ↔ cm 변환
    const m = 1+Math.floor(Math.random()*9);
    const q = `${m}m는 몇 cm일까요?`;
    const ans = m*100;
    const choices=[ans]; while(choices.length<4){const d=ans+(Math.floor(Math.random()*4)-2)*10;if(d>0&&!choices.includes(d))choices.push(d);}
    return { q, ans, visual:'', choices: choices.sort(()=>Math.random()-.5) };
  } else {
    // 길이 비교 (m 몇 cm 표기)
    const cm1 = 100+Math.floor(Math.random()*200), cm2 = 100+Math.floor(Math.random()*200);
    if (cm1===cm2) return genLength();
    const fmt = c => `${Math.floor(c/100)}m ${c%100}cm`;
    const big = Math.random()>0.5;
    const q = `${fmt(cm1)} 와 ${fmt(cm2)}<br>더 ${big?'긴':'짧은'} 길이는?`;
    const ans = big ? fmt(Math.max(cm1,cm2)) : fmt(Math.min(cm1,cm2));
    return { q, ans, visual:'', wide:true, choices: [fmt(cm1), fmt(cm2)] };
  }
}

// ── 분류하기 (같은 무리 찾기) ──
const CLASSIFY_SETS = [
  { cat:'과일', items:['🍎','🍌','🍇','🍊'], odd:['🐶','🐱','🚗','⚽'] },
  { cat:'동물', items:['🐶','🐱','🐰','🐻'], odd:['🍎','🚗','⚽','📕'] },
  { cat:'탈것', items:['🚗','🚌','🚲','✈️'], odd:['🍎','🐶','⚽','📕'] },
  { cat:'채소', items:['🥕','🥦','🌽','🥔'], odd:['🐶','🚗','⚽','📕'] },
  { cat:'악기', items:['🎸','🎹','🥁','🎻'], odd:['🍎','🐶','🚗','⚽'] },
];
function genClassify(){
  const set = CLASSIFY_SETS[Math.floor(Math.random()*CLASSIFY_SETS.length)];
  const threeItems = [...set.items].sort(()=>Math.random()-.5).slice(0,3);
  const oddItem = set.odd[Math.floor(Math.random()*set.odd.length)];
  const all = [...threeItems, oddItem].sort(()=>Math.random()-.5);
  return { q:`다음 중 ${set.cat}이(가) <span style="color:var(--red)">아닌</span> 하나는?`, visual:'',
    ans:oddItem, choices: all };
}

// ── 곱셈 (개념 도입 / 구구단) ──
function genMultiply(cfg){
  if (cfg.stage==='concept'){
    const gs = 2+Math.floor(Math.random()*4); // 묶음 크기 2~5
    const ng = 2+Math.floor(Math.random()*4); // 묶음 수 2~5
    const emojiSet = ['🍎','🌟','🐸','🎈','🍇','🐶'];
    const emoji = emojiSet[Math.floor(Math.random()*emojiSet.length)];
    let visual='';
    for(let i=0;i<gs*ng;i++) visual += `<span style="font-size:1.3rem">${emoji}</span>`;
    const q = `${emoji}가 ${gs}개씩 ${ng}묶음이면?<br><span style="color:#CC66FF">${gs} × ${ng} = <span class="blank">?</span></span>`;
    const ans = gs*ng;
    const choices=[ans]; while(choices.length<4){const d=ans+(Math.floor(Math.random()*7)-3);if(d>0&&!choices.includes(d))choices.push(d);}
    return { q, ans, visual, choices: choices.sort(()=>Math.random()-.5) };
  } else {
    const a = 2+Math.floor(Math.random()*8), b = 1+Math.floor(Math.random()*9);
    const q = `${a} × ${b} = <span class="blank">?</span>`;
    const ans = a*b;
    const choices=[ans]; while(choices.length<4){const d=ans+(Math.floor(Math.random()*9)-4);if(d>0&&!choices.includes(d))choices.push(d);}
    return { q, ans, visual:'', choices: choices.sort(()=>Math.random()-.5) };
  }
}

// ── 시각과 시간 (5분 단위 읽기) ──
function genClockQ(){
  if (Math.random()<0.25){
    // 시간 단위 환산
    const pairs = [['1시간','60분'],['60분','1시간'],['30분','반 시간']];
    const [q1,a1] = pairs[Math.floor(Math.random()*pairs.length)];
    const opts = ['60분','1시간','반 시간','120분'];
    return { q:`${q1}은 얼마일까요?`, ans:a1, visual:'', choices: opts.sort(()=>Math.random()-.5) };
  }
  const h=1+Math.floor(Math.random()*12);
  const mOptions=[0,5,10,15,20,25,30,35,40,45,50,55];
  const m = mOptions[Math.floor(Math.random()*mOptions.length)];
  const ans = `${h}시 ${m===0?'정각':m+'분'}`;
  const choices=[ans];
  while(choices.length<4){
    const hh=1+Math.floor(Math.random()*12), mm=mOptions[Math.floor(Math.random()*mOptions.length)];
    const c = `${hh}시 ${mm===0?'정각':mm+'분'}`;
    if(!choices.includes(c)) choices.push(c);
  }
  return { q:'몇 시 몇 분일까요?', ans, visual:'', draw:(cvs)=>drawClock(cvs,h,m), choices: choices.sort(()=>Math.random()-.5) };
}
function drawClock(cvs,h,m){
  const ctx=cvs.getContext('2d'); const W=cvs.width,H=cvs.height,cx=W/2,cy=H/2,r=95;
  ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#CC66FF'; ctx.lineWidth=7; ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#3D2B1F'; ctx.font='bold 18px Gaegu, sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let i=1;i<=12;i++){ const a=(i/12)*Math.PI*2-Math.PI/2; ctx.fillText(i, cx+Math.cos(a)*(r-22), cy+Math.sin(a)*(r-22)); }
  const hourAng=((h%12)/12)*Math.PI*2+(m/60)*(Math.PI*2/12)-Math.PI/2;
  ctx.strokeStyle='#FFB300'; ctx.lineWidth=8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(hourAng)*48, cy+Math.sin(hourAng)*48); ctx.stroke();
  const minAng=(m/60)*Math.PI*2-Math.PI/2;
  ctx.strokeStyle='#4488FF'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(minAng)*74, cy+Math.sin(minAng)*74); ctx.stroke();
  ctx.fillStyle='#3D2B1F'; ctx.beginPath(); ctx.arc(cx,cy,6,0,Math.PI*2); ctx.fill();
}

// ── 표와 그래프 ──
const GRAPH_SETS = [
  { title:'좋아하는 과일', cats:[['사과','🍎'],['바나나','🍌'],['포도','🍇'],['딸기','🍓']] },
  { title:'좋아하는 동물', cats:[['강아지','🐶'],['고양이','🐱'],['토끼','🐰'],['곰','🐻']] },
  { title:'좋아하는 색깔', cats:[['빨강','🔴'],['파랑','🔵'],['노랑','🟡'],['초록','🟢']] },
];
function genGraph(){
  const set = GRAPH_SETS[Math.floor(Math.random()*GRAPH_SETS.length)];
  const counts = set.cats.map(()=> 2+Math.floor(Math.random()*7));
  const rows = set.cats.map((c,i)=>`${c[1]} ${c[0]}: ${'●'.repeat(counts[i])} (${counts[i]}명)`).join('<br>');
  const askMax = Math.random()>0.5;
  const maxIdx = counts.indexOf(Math.max(...counts));
  const minIdx = counts.indexOf(Math.min(...counts));
  const q = `<div style="font-size:1.1rem;line-height:1.7">${set.title}<br>${rows}</div><br>가장 ${askMax?'많은':'적은'} 것은?`;
  const ans = set.cats[askMax?maxIdx:minIdx][0];
  const choices = set.cats.map(c=>c[0]);
  return { q, ans, visual:'', wide:true, choices: choices.sort(()=>Math.random()-.5) };
}

// ── 규칙 찾기 ──
function genPattern(){
  const type = Math.random();
  if (type<0.5){
    // 숫자 규칙 (일정하게 증가/감소)
    const start = 1+Math.floor(Math.random()*10);
    const step = [2,3,5,10][Math.floor(Math.random()*4)];
    const dir = Math.random()>0.5 ? 1 : -1;
    const seq = [0,1,2].map(i=>start + dir*step*i);
    const ans = start + dir*step*3;
    const q = `${seq.join(', ')}, <span class="blank">?</span><br>다음에 올 수는?`;
    const choices=[ans]; while(choices.length<4){const d=ans+dir*step*(Math.floor(Math.random()*3)-1)+(Math.floor(Math.random()*5)-2);if(!choices.includes(d))choices.push(d);}
    return { q, ans, visual:'', choices: choices.sort(()=>Math.random()-.5) };
  } else {
    // 모양/색 규칙
    const sets=[['🔴','🔵','🔴','🔵'],['⭐','⭐','🌙','⭐','⭐'],['🍎','🍌','🍇','🍎','🍌']];
    const unit = sets[Math.floor(Math.random()*sets.length)];
    const repeats = 2;
    const seq=[]; for(let i=0;i<repeats;i++) seq.push(...unit);
    const ans = unit[0];
    const pool = ['🔴','🔵','⭐','🌙','🍎','🍌','🍇'];
    const choices=[...new Set(unit)]; while(choices.length<4) choices.push(pool[Math.floor(Math.random()*pool.length)]);
    return { q:`${seq.join(' ')} <span class="blank">?</span><br>다음에 올 것은?`, ans, visual:'', choices: choices.slice(0,4).sort(()=>Math.random()-.5) };
  }
}
